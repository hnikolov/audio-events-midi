/* ========================== .aem Export / Import ========================== */
const AEM_MAGIC = new Uint8Array([0x41, 0x45, 0x4D, 0x49]); // "AEMI"
const AEM_VERSION = 1;
let lastExportDirHandle = null;

async function packAem(songName) {
    const song = await getSongByName(songName);
    if (!song) throw new Error('Song not found: ' + songName);

    const eventMap = JSON.parse(localStorage.getItem(EVENT_MAP_KEY) || '{}');
    const volMap = JSON.parse(localStorage.getItem(VOLUME_MAP_KEY) || '{}');
    const speedMap = JSON.parse(localStorage.getItem(SPEED_MAP_KEY) || '{}');
    const abMap = JSON.parse(localStorage.getItem(AB_LOOP_MAP_KEY) || '{}');

    const metadata = {
        version: AEM_VERSION,
        name: song.name,
        type: song.type || '',
        lastModified: song.lastModified || Date.now(),
        markers: normalizeMarkerList(eventMap[songName] || []),
        volume: volMap[songName] !== undefined ? volMap[songName] : 1.0,
        speed: speedMap[songName] !== undefined ? speedMap[songName] : 1.0,
        abLoop: abMap[songName] || null
    };

    const metaJson = new TextEncoder().encode(JSON.stringify(metadata));
    const audioBlob = song.data instanceof Blob ? song.data : new Blob([song.data]);
    const audioBuffer = await audioBlob.arrayBuffer();

    // Layout: [4 magic][1 version][4 meta-length][N meta][rest audio]
    const totalSize = 4 + 1 + 4 + metaJson.byteLength + audioBuffer.byteLength;
    const output = new ArrayBuffer(totalSize);
    const view = new DataView(output);
    const bytes = new Uint8Array(output);

    bytes.set(AEM_MAGIC, 0);
    view.setUint8(4, AEM_VERSION);
    view.setUint32(5, metaJson.byteLength, false);
    bytes.set(metaJson, 9);
    bytes.set(new Uint8Array(audioBuffer), 9 + metaJson.byteLength);

    return new Blob([output], { type: 'application/octet-stream' });
}

function unpackAem(arrayBuffer) {
    const view = new DataView(arrayBuffer);
    const bytes = new Uint8Array(arrayBuffer);

    if (bytes.length < 9) throw new Error('File too small to be a valid .aem file');
    for (let i = 0; i < 4; i++) {
        if (bytes[i] !== AEM_MAGIC[i]) throw new Error('Not a valid .aem file (bad magic)');
    }
    const fileVersion = view.getUint8(4);
    if (fileVersion > AEM_VERSION) throw new Error('Unsupported .aem version: ' + fileVersion);

    const metaLen = view.getUint32(5, false);
    if (9 + metaLen > bytes.length) throw new Error('Corrupt .aem file (metadata overflows)');

    const metaBytes = bytes.slice(9, 9 + metaLen);
    const metadata = JSON.parse(new TextDecoder().decode(metaBytes));

    const audioBytes = bytes.slice(9 + metaLen);
    const audioBlob = new Blob([audioBytes], { type: metadata.type || 'audio/mpeg' });

    return { metadata, audioBlob };
}

function makeSongNameUnique(desiredName, existingNames) {
    if (!existingNames.includes(desiredName)) return desiredName;
    let counter = 1;
    const dotIdx = desiredName.lastIndexOf('.');
    const base = dotIdx > 0 ? desiredName.substring(0, dotIdx) : desiredName;
    const ext = dotIdx > 0 ? desiredName.substring(dotIdx) : '';
    let candidate;
    do {
        candidate = `${base} (${counter})${ext}`;
        counter++;
    } while (existingNames.includes(candidate));
    return candidate;
}

async function exportSong(songName) {
    try {
        const blob = await packAem(songName);
        const safeName = songName.replace(/[^a-zA-Z0-9._\-() ]/g, '_');
        const fileName = safeName.replace(/\.[^.]+$/, '') + '.aem';

        if (window.showSaveFilePicker) {
            try {
                const opts = {
                    suggestedName: fileName,
                    types: [{ description: 'Audio Events MIDI file', accept: { 'application/octet-stream': ['.aem'] } }]
                };
                if (lastExportDirHandle) opts.startIn = lastExportDirHandle;
                const handle = await window.showSaveFilePicker(opts);
                lastExportDirHandle = await handle.getParent?.() || null;
                const writable = await handle.createWritable();
                await writable.write(blob);
                await writable.close();
                return;
            } catch (err) {
                if (err.name === 'AbortError') return;
            }
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
    } catch (err) {
        alert('Export failed: ' + err.message);
    }
}

async function importSong(file) {
    try {
        const arrayBuffer = await file.arrayBuffer();
        const { metadata, audioBlob } = unpackAem(arrayBuffer);

        const allSongs = await getAllSongs();
        const existingNames = allSongs.map(s => s.name);

        let finalName = metadata.name || file.name.replace(/\.aem$/i, '');

        if (existingNames.includes(finalName)) {
            const suggested = makeSongNameUnique(finalName, existingNames);
            const userInput = prompt(
                `"${finalName}" already exists.\n\nEnter a new name, or press OK to use the suggested alternative:`,
                suggested
            );
            if (userInput === null) return;
            finalName = userInput.trim();
            if (!finalName) return;
        }

        const audioFile = new File([audioBlob], finalName, {
            type: metadata.type || 'audio/mpeg',
            lastModified: metadata.lastModified || Date.now()
        });
        await putSongs([audioFile]);

        // Always write imported values so overwriting a selected song correctly
        // replaces existing settings (including clearing markers or AB loop).
        const eventMap = JSON.parse(localStorage.getItem(EVENT_MAP_KEY) || '{}');
        eventMap[finalName] = normalizeMarkerList(Array.isArray(metadata.markers) ? metadata.markers : []);
        localStorage.setItem(EVENT_MAP_KEY, JSON.stringify(eventMap));

        const volMap = JSON.parse(localStorage.getItem(VOLUME_MAP_KEY) || '{}');
        volMap[finalName] = Number.isFinite(metadata.volume) ? metadata.volume : 1.0;
        localStorage.setItem(VOLUME_MAP_KEY, JSON.stringify(volMap));

        const speedMap = JSON.parse(localStorage.getItem(SPEED_MAP_KEY) || '{}');
        speedMap[finalName] = Number.isFinite(metadata.speed) ? metadata.speed : 1.0;
        localStorage.setItem(SPEED_MAP_KEY, JSON.stringify(speedMap));

        const abMap = JSON.parse(localStorage.getItem(AB_LOOP_MAP_KEY) || '{}');
        if (metadata.abLoop && typeof metadata.abLoop === 'object') {
            abMap[finalName] = metadata.abLoop;
        } else {
            delete abMap[finalName];
        }
        localStorage.setItem(AB_LOOP_MAP_KEY, JSON.stringify(abMap));

        // If the imported song is currently selected, sync the live player state.
        if (finalName === currentFileName) {
            const savedVol = volMap[finalName];
            audio.volume = savedVol;
            audio.muted = false;
            volSlider.value = savedVol;
            const savedRate = speedMap[finalName];
            audio.playbackRate = savedRate;
            speedBtn.innerHTML = `${savedRate.toFixed(2)}`;
            firedEvents.clear();
            lastTriggeredMarkerTime = null;
            lastTriggeredMarkerIndex = null;
            await refreshEventUI();
            loadABLoop();
            updateMarkerTicks();
            updateMuteUI();
        }

        await renderPlaylist();
    } catch (err) {
        alert('Import failed: ' + err.message);
    }
}

const importInput = document.getElementById('importInput');
importInput.addEventListener('click', () => { importInput.value = ''; });
importInput.onchange = async () => {
    const file = importInput.files?.[0];
    importInput.value = '';
    if (!file || !db) return;
    await importSong(file);
};

/* ============================== Initialize DB ============================= */
(async function init() {
    db = await openDB();
    await renderPlaylist();
})();

/* ===================== Fixed bars: measure heights (no re-parenting) ===================== */
(function () {
  const root = document.documentElement;

  function setHeights() {
    const topBar    = document.getElementById('mobileMidiBar');
    const bottomBar = document.getElementById('mobilePlayerBar');
    const titleEl   = document.getElementById('current-title');
    if (topBar) {
      const th = topBar.offsetHeight || 0;
      root.style.setProperty('--mobile-topbar-height', th + 'px');
    }
    if (bottomBar) {
      const bh = bottomBar.offsetHeight || 0;
      root.style.setProperty('--mobile-playerbar-height', bh + 'px');
    }
    if (titleEl && titleEl.offsetHeight > 0) {
      root.style.setProperty('--sticky-title-height', titleEl.offsetHeight + 'px');
    }
  }

  let scheduled = false;
  function rafSetHeights() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(() => { scheduled = false; setHeights(); });
  }

  window.addEventListener('resize', rafSetHeights, { passive: true });
  window.addEventListener('orientationchange', setHeights);
  document.addEventListener('DOMContentLoaded', () => {
    setHeights();
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(setHeights).catch(() => {});
    }
  });
})();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// Portrait orientation lock for installed PWA
(function () {
  function lockPortrait() {
    if (screen.orientation && typeof screen.orientation.lock === 'function') {
      screen.orientation.lock('portrait').catch(function (err) {
        console.warn('[orientation-lock]', err.name, err.message);
      });
    }
  }
  // Try immediately (works if already in standalone context)
  lockPortrait();
  // Retry after DOM is ready
  document.addEventListener('DOMContentLoaded', lockPortrait);
  // Retry every time the app comes back to foreground
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) lockPortrait();
  });
})();

// Screen Wake Lock: keep screen on while the app is visible
(function () {
  var wl = null;
  function acquire() {
    if (wl || !('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen').then(function (lock) {
      wl = lock;
      wl.addEventListener('release', function () { wl = null; });
    }).catch(function () { /* OS refused */ });
  }
  function release() { if (wl) { wl.release(); wl = null; } }
  document.addEventListener('visibilitychange', function () {
    document.visibilityState === 'visible' ? acquire() : release();
  });
  acquire();
})();
</script>

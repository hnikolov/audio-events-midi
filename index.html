let toDisconnect = 'x';
let toConnect = 'C';
let connectionStatus = toConnect;

async function connectOrDisconnect() {
    if (connectionStatus === toDisconnect) {
        if (currentTransport === 'ble') {
            try { if (device && device.gatt.connected) device.gatt.disconnect(); } catch {}
            device = server = service = midiChar = sparkWriteChar = null;
        } else if (currentTransport === 'usb') {
            usbOutput = null;
        }
        currentTransport = null;
        deviceType = null;
        connectionStatus = toConnect;
        setStatusText('Connect');
        return;
    }

    const access = await ensureMidiAccess();
    if (access) {
        const outputs = listUsbOutputs();

        if (outputs.length === 1) {
            const candidate = outputs[0];
            const ok = confirm(`Connect to USB MIDI output:\n\n${candidate.name || 'USB Output'}\n\nOK to connect, Cancel to choose BLE.`);
            if (ok) {
                usbOutput = candidate;
                currentTransport = 'usb';
                deviceType = 'midi';
                connectionStatus = toDisconnect;
                setStatusText(usbOutput.name || 'USB Output');
                finishUsbConnect();
                return;
            }
        } else if (outputs.length > 1) {
            usbOutputEl.innerHTML = '';
            outputs.forEach(out => {
                const opt = document.createElement('option');
                opt.value = out.id;
                opt.textContent = out.name || `Output ${out.id}`;
                usbOutputEl.appendChild(opt);
            });
            usbDialog.showModal();

            const onConnect = () => {
                const id = usbOutputEl.value;
                usbOutput = access.outputs.get(id);
                usbDialog.close();
                usbConnectBtn.removeEventListener('click', onConnect);
                usbCancelBtn.removeEventListener('click', onCancel);
                if (usbOutput) {
                    currentTransport = 'usb';
                    deviceType = 'midi';
                    connectionStatus = toDisconnect;
                    setStatusText(usbOutput.name || 'USB Output');
                    finishUsbConnect();
                } else {
                    connectBleFlow();
                }
            };
            const onCancel = () => {
                usbDialog.close();
                usbConnectBtn.removeEventListener('click', onConnect);
                usbCancelBtn.removeEventListener('click', onCancel);
                connectBleFlow();
            };
            usbConnectBtn.addEventListener('click', onConnect, { once: true });
            usbCancelBtn.addEventListener('click', onCancel,  { once: true });
            return;
        }
    }
    connectBleFlow();
}
async function connectBleFlow() {
    if (!navigator.bluetooth) { setStatusText('Web Bluetooth unavailable'); return; }
    try {
        setStatusText('Requesting BLE device...');
        device = await navigator.bluetooth.requestDevice({
            filters: [
                { services: [MIDI_SERVICE_UUID] },
                { namePrefix: 'Spark' }
            ],
            optionalServices: [MIDI_SERVICE_UUID, SPARK_SERVICE_UUID]
        });

        device.addEventListener('gattserverdisconnected', () => {
            connectionStatus = toConnect;
            setStatusText('Connect');
            device = server = service = midiChar = sparkWriteChar = null;
            deviceType = null;
            currentTransport = null;
        });

        setStatusText('Connecting…');
        server = await device.gatt.connect();

        const devName = (device.name || '').toLowerCase();
        if (devName.includes('thr')) {
            device.gatt.disconnect();
            device = server = service = midiChar = sparkWriteChar = null;
            currentTransport = null;
            deviceType = null;
            connectionStatus = toConnect;
            setStatusText('Connect');
            alert('THRII connected via Bluetooth is not supported.\nPlease connect via USB.');
            return;
        }

        const isSpark = devName.startsWith('spark');
        if (isSpark) {
            const sparkService = await server.getPrimaryService(SPARK_SERVICE_UUID);
            sparkWriteChar = await sparkService.getCharacteristic(SPARK_WRITE_UUID);
            const sparkNotifyChar = await sparkService.getCharacteristic(SPARK_NOTIFY_UUID);
            await sparkNotifyChar.startNotifications();
            sparkNotifyChar.addEventListener('characteristicvaluechanged', () => { /* no-op */ });
            deviceType = 'spark';
        } else {
            service = await server.getPrimaryService(MIDI_SERVICE_UUID);
            midiChar = await service.getCharacteristic(MIDI_CHARACTERISTIC_UUID);
            try {
                await midiChar.startNotifications();
                midiChar.addEventListener('characteristicvaluechanged', () => { /* no-op */ });
            } catch { /* continue */ }
            deviceType = 'midi';
        }

        currentTransport = 'ble';
        connectionStatus = toDisconnect;
        setStatusText(device.name || 'BLE Device');
    } catch (err) {
        const isUserCancel = err && (err.name === 'NotFoundError' || err.name === 'AbortError');
        if (isUserCancel) {
            connectionStatus = toConnect;
            setStatusText('Connect');
            return;
        }
        setStatusText('Error');
    }
}

function seekRelative(seconds) {
    const prev = audio.currentTime;
    const dur = audio.duration || prev;
    const target = Math.min(Math.max(0, prev + seconds), dur);
    if (seconds < 0 && target < prev) { reconcileMarkersOnBackwardJump(target, prev); }
    else if (seconds > 0 && target > prev) { reconcileMarkersOnForwardJump(prev, target); }
    audio.currentTime = target;
    updateProgressUI(); // Explicitly update progress bar
}

function seekToTime(targetTime) {
    const prev = audio.currentTime;
    if (targetTime < prev) { reconcileMarkersOnBackwardJump(targetTime, prev); }

    audio.currentTime = targetTime;
    updateProgressUI(); // Explicitly update progress bar (important for paused audio)
}

async function getNextSongInPlaylist() {

    if (!order.length) return null;

    const nextIndex = (currentIndex + 1) % order.length;
    return order[nextIndex];
}

async function prevTrack() {
    if (!currentFileName) return;
    // If more than 3 seconds in, restart current song; otherwise go to previous
    if (audio.currentTime > 3) {
        seekToTime(0);
        return;
    }
    const order = getCurrentPlayableOrder();
    if (!order.length) return;
    const idx = order.indexOf(currentFileName);
    if (idx === -1) {
        await playSong(order[0]);
        return;
    }
    const prevIdx = (idx - 1 + order.length) % order.length;
    await playSong(order[prevIdx]);
}

const MIN_GAP_SEC = 0.05;

/* ============================ A/B Loop Controls ========================== */
function isABValid() { return abLoop.a !== null && abLoop.b !== null && abLoop.b > abLoop.a; }
function renderABButtons() {

    }

    if (abClearIcon) abClearIcon.style.color = valid ? 'var(--danger)' : '';
}
function updateABUI() {
    const valid = isABValid();
    abEnableBtn.classList.toggle('loop-active', abLoop.enabled && valid);
    renderABButtons();
}
function toggleABLoop() { abLoop.enabled = !abLoop.enabled; if (abLoop.enabled) abLoop.visible = true; saveABLoop(); }
function toggleABVisibility() { abLoop.visible = !abLoop.visible; saveABLoop(); }
// function toggleABVisibility() { 
    // abLoop.visible = !abLoop.visible;
    // if (abLoop.visible) { abLoop.enabled = true; }
    // else { abLoop.enabled = false; }
    // saveABLoop(); 
// }
function setLoopA() {
    abLoop.a = audio.currentTime;
    if (abLoop.b !== null && abLoop.b <= abLoop.a + MIN_GAP_SEC) {
        abLoop.b = Math.min(audio.duration || abLoop.a + MIN_GAP_SEC, abLoop.a + MIN_GAP_SEC);
    }
    abLoop.visible = true;
    if (abLoop.a < abLoop.b - MIN_GAP_SEC) { abLoop.enabled = true; }
    else { abLoop.enabled = false; }
    saveABLoop();
}
function setLoopB() {
    abLoop.b = audio.currentTime;
    if (abLoop.a !== null && abLoop.b <= abLoop.a + MIN_GAP_SEC) {
        abLoop.a = Math.max(0, abLoop.b - MIN_GAP_SEC);
    }
    abLoop.visible = true;
    if (abLoop.a < abLoop.b - MIN_GAP_SEC) { abLoop.enabled = true; }
    else { abLoop.enabled = false; }
    saveABLoop();
}
function rewindToA() {
    const a = (abLoop.a !== null) ? abLoop.a : 0;
    reconcileMarkersOnBackwardJump(a, audio.currentTime);
    audio.currentTime = Math.min(Math.max(0, a), audio.duration || a);
    updateProgressUI(); // Explicitly update progress bar
}
function loadABLoop() {
    const map = JSON.parse(localStorage.getItem(AB_LOOP_MAP_KEY) || '{}');
    const entry = map[currentFileName];
    abLoop = entry ? {
        enabled: !!entry.enabled,
        visible: entry.visible === undefined ? true : !!entry.visible,
        a: entry.a ?? null,
        b: entry.b ?? null
    } : { enabled: false, visible: true, a: null, b: null };
    updateABUI();
    updateABOverlay();
    // Auto-open/close AB panel based on saved state
    const panel = document.getElementById('ab-panel');
    if (panel) {
        const wasCollapsed = panel.classList.contains('collapsed');
        const shouldCollapse = !(abLoop.enabled && isABValid());
        if (shouldCollapse && !wasCollapsed) {
            panel.classList.add('collapsed');
            panel.addEventListener('transitionend', () => {
                window.dispatchEvent(new Event('resize'));
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    scrollActiveItemIntoView();
                }));
            }, { once: true });
        } else if (!shouldCollapse && wasCollapsed) {
            panel.classList.remove('collapsed');
            panel.addEventListener('transitionend', () => {
                window.dispatchEvent(new Event('resize'));
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    scrollActiveItemIntoView();
                }));
            }, { once: true });
        }
    }
}
function saveABLoop() {
    if (!currentFileName) return;
    const map = JSON.parse(localStorage.getItem(AB_LOOP_MAP_KEY) || '{}');
    map[currentFileName] = abLoop;
    localStorage.setItem(AB_LOOP_MAP_KEY, JSON.stringify(map));

/* =========================== Progress / Overlay ========================== */
function renderTimeLabel(currentTime) {
    const dur = audio.duration || 0;
    timeCurrent.textContent = formatClock(currentTime);
    timeDuration.textContent = formatClock(dur, 0);
}
function updateProgressUI() {
    const dur = audio.duration || 0;
    const pct = dur ? (audio.currentTime / dur) * 100 : 0;
    progressFill.style.width = `${pct}%`;
    renderTimeLabel(audio.currentTime);
    updateABOverlay();
}
function updateABOverlay() {
    const dur = audio.duration;
    const show = abLoop.visible && isABValid() && dur && isFinite(dur);
    progressAB.style.display = show ? 'block' : 'none';
    if (!show) return;
    const aPct = (abLoop.a / dur) * 100;
    const bPct = (abLoop.b / dur) * 100;
    progressAB.style.left = `${aPct}%`;
    progressAB.style.width = `${Math.max(0, bPct - aPct)}%`;
    progressAB.classList.toggle('enabled', !!abLoop.enabled && !!abLoop.visible);
}
function xToTime(clientX) {
    const rect = progressBar.getBoundingClientRect();
    const ratio = (clientX - rect.left) / rect.width;
    const dur = audio.duration || 0;
    return Math.min(Math.max(0, ratio * dur), dur);
}
function showGhostPreview(targetTime) {
    const dur = audio.duration || 0;
    if (!dur || !isFinite(dur)) return;
    const targetPct = (targetTime / dur) * 100;
    const currentPct = scrubStartTime != null ? (scrubStartTime / dur) * 100 : parseFloat(progressFill.style.width) || 0;
    if (targetPct >= currentPct) {
        // Dragging forward: ghost extends beyond the solid fill
        progressFill.style.width = `${currentPct}%`;
        progressGhostFill.style.left = '0%';
        progressGhostFill.style.width = `${targetPct}%`;
    } else {
        // Dragging backward: shrink the solid fill to target, ghost covers the gap
        progressFill.style.width = `${targetPct}%`;
        progressGhostFill.style.left = `${targetPct}%`;
        progressGhostFill.style.width = `${currentPct - targetPct}%`;
    }
    progressGhostFill.style.display = 'block';
    progressGhost.style.left = `${targetPct}%`;
    progressGhost.style.display = 'block';
}
function hideGhostPreview() {
    progressGhostFill.style.display = 'none';
    progressGhostFill.style.left = '0%';
    progressGhost.style.display = 'none';
}

/* ====================== Markers (with MIDI dispatch) ===================== */
function fireMarkerByIndex(i, evt, opts) {
    const forceSend = (opts && opts.forceCc) ? true : false;
    const firedBefore = firedEvents.has(evt.time);

    firedEvents.add(evt.time);
    lastTriggeredMarkerTime = evt.time;
    lastTriggeredMarkerIndex = i;

    setActiveMarkerUIByIndex(i);
    updateTickFiredClassByIndex(i, true);

    if (currentTransport && (forceSend || !firedBefore)) {
        try {
            if (deviceType === 'spark') {
                sendSparkPreset(evt.preset);
            } else if (deviceType === 'thrii') {
                sendThriiPreset(evt.preset);
            } else {
                const name = getConnectedDeviceName();
                if (shouldRoutePresetAsCc(name)) window.sendCc(1, 1, evt.preset);
                else window.sendPc(1, presetToProgram(evt.preset));
            }
        } catch {}
    }
}

/* =========================== Pointer handlers ============================ */
function onPointerDown(e) {
    if (!audio.src) return;
    pointerId = e.pointerId;
    progressBar.setPointerCapture(pointerId);
    wasPlaying = !audio.paused;
    if (wasPlaying) audio.pause();

    const role = e.target.dataset.role || null;
    const dur = audio.duration || 0;
    const rect = progressBar.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;

    if (role === 'handle-a') {
        dragMode = 'handle-a';
    } else if (role === 'handle-b') {
        dragMode = 'handle-b';
    } else if (role === 'segment') {
        dragMode = 'segment';
        const aPct = (abLoop.a / dur);
        const bPct = (abLoop.b / dur);
        segmentLeftPct = aPct;
        segmentWidthPct = Math.max(0, bPct - aPct);
        pointerOffsetPct = clamp(ratio - segmentLeftPct, 0, segmentWidthPct);
        abDrag.classList.add('dragging');
    } else {
        dragMode = 'scrub';
        isScrubbing = true;
        scrubStartTime = audio.currentTime;
        scrubTargetTime = xToTime(e.clientX);
        showGhostPreview(scrubTargetTime);
        renderTimeLabel(scrubTargetTime);
    }
    e.preventDefault();
}
function onPointerMove(e) {
    if (!dragMode) return;
    const dur = audio.duration || 0;
    if (dur <= 0) return;

    if (dragMode === 'scrub') {
        scrubTargetTime = xToTime(e.clientX);
        showGhostPreview(scrubTargetTime);
        renderTimeLabel(scrubTargetTime);
        return;
    }
    const rect = progressBar.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    const time = clamp(ratio * dur, 0, dur);

    if (dragMode === 'handle-a') {
        const maxA = (abLoop.b !== null) ? (abLoop.b - MIN_GAP_SEC) : dur - MIN_GAP_SEC;
        abLoop.a = clamp(time, 0, Math.max(0, maxA));
        updateABOverlay(); updateABUI();
    } else if (dragMode === 'handle-b') {
        const minB = (abLoop.a !== null) ? (abLoop.a + MIN_GAP_SEC) : MIN_GAP_SEC;
        abLoop.b = clamp(time, minB, dur);
        updateABOverlay(); updateABUI();
    } else if (dragMode === 'segment') {
        const newLeftPct = clamp(ratio - pointerOffsetPct, 0, 1 - segmentWidthPct);
        abLoop.a = newLeftPct * dur;
        abLoop.b = (newLeftPct + segmentWidthPct) * dur;
        updateABOverlay(); updateABUI();
    }
}
function onPointerUp(e) {
    if (pointerId !== null) { try { progressBar.releasePointerCapture(pointerId); } catch {} }
    pointerId = null;

    if (dragMode === 'scrub') {
        const start = scrubStartTime ?? audio.currentTime;
        const target = clamp(scrubTargetTime ?? audio.currentTime, 0, audio.duration || audio.currentTime);
        hideGhostPreview();

        if (target < start) { reconcileMarkersOnBackwardJump(target, start); }
        else if (target > start) { reconcileMarkersOnForwardJump(start, target); }

        audio.currentTime = target;
        isScrubbing = false; scrubStartTime = null; scrubTargetTime = null;

        if (wasPlaying) {
            audio.play().catch(() => { updatePlayPauseUI(); });
        }
        updatePlayPauseUI(); updateProgressUI();
    } else if (dragMode) {
        saveABLoop();
        abDrag.classList.remove('dragging');
    }
    dragMode = null;
    wasPlaying = false;
}
function onPointerCancel(e) {
    // Ignore unrelated pointer-cancel events that do not belong to an active progress interaction.
    if (!dragMode && pointerId === null) return;

    const resumeFromCanceledScrub = (dragMode === 'scrub') && wasPlaying && audio.paused;
    hideGhostPreview();
    updateProgressUI();
    if (resumeFromCanceledScrub) {
        audio.play().catch(() => { updatePlayPauseUI(); });
        updatePlayPauseUI();
    }
    dragMode = null; isScrubbing = false; scrubStartTime = null; scrubTargetTime = null; pointerId = null;
    wasPlaying = false;
}
progressBar.addEventListener('pointerdown', onPointerDown);
window.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup', onPointerUp);
window.addEventListener('pointercancel', onPointerCancel);

async function renderPlaylist() {
    if (!db) {
        const reason = escapeHtml(storageUnavailableReason || 'IndexedDB could not be opened.');
        playlistUI.innerHTML = `<div style='padding:10px'>Storage unavailable<br><small style='color:var(--text-secondary)'>${reason} Use the same origin as before (same protocol/host/port). If you opened this via file://, run it from http://localhost.</small></div>`;
        return;
    }
    try {
        const songs = await getAllSongs();
        if (!Array.isArray(songs) || !songs.length) {
            syncPlaysetStateWithSongs([]);
            updatePlaysetLabel();
            playlistUI.innerHTML = "<div style='padding:10px'>Empty</div>";
            return;
        }

        const allSongsOrder = reconcileOrderWithSongs(songs);
        syncPlaysetStateWithSongs(allSongsOrder);
        updatePlaysetLabel();

        const songByName = new Map(songs.map(song => [song.name, song]));
        const selectedListId = getSelectedListId();

        if (!visibleOrder.length) {
            if (selectedListId === ALL_SONGS_LIST_ID) {
                playlistUI.innerHTML = "<div style='padding:10px'>Empty</div>";
            } else {
                const current = getCurrentPlayset();
                playlistUI.innerHTML = `<div style='padding:10px'>${escapeHtml(current?.name || 'Playset')} is empty</div>`;
            }
            return;
        }

        const visibleSongs = visibleOrder.map(name => songByName.get(name)).filter(Boolean);

        playlistUI.innerHTML = "";
        visibleSongs.forEach((song, idx) => {
            const row = document.createElement('div');
            row.className = `playlist-item ${song.name === currentFileName ? 'active' : ''}`;
            row.style.position = 'relative';
            row.dataset.idx = idx;
            const label = document.createElement('span');
            label.textContent = song.name;

            const menuBtn = document.createElement('button');
            menuBtn.className = 'menu-btn';
            menuBtn.innerHTML = '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>';
            menuBtn.title = 'Options';
            menuBtn.onclick = (e) => {
                e.stopPropagation();
                togglePlaylistMenu(e, song.name, row);
            };

            row.onclick = (e) => {

            dragHandle.className = 'drag-handle';

            row.appendChild(dragHandle);
            row.appendChild(label);
            row.appendChild(menuBtn);
            playlistUI.appendChild(row);
        });
    } catch (err) {
        console.error("renderPlaylist error:", err);
        playlistUI.innerHTML = "<div style='padding:10px'>Error loading playlist</div>";
    }
}

async function playSong(name) {
    const song = await getSongByName(name);
    if (!song) return;

    currentFileName = name;
    setCurrentTitleState(name, true);
    activeBlobUrl = safeRevoke(activeBlobUrl);
    activeBlobUrl = URL.createObjectURL(song.data);
    audio.src = activeBlobUrl;

    if (!audioCtx) initWebAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    const volMap = JSON.parse(localStorage.getItem(VOLUME_MAP_KEY) || '{}');
    const savedVol = volMap[name] !== undefined ? volMap[name] : 1.0;
    audio.volume = 1.0; // Native volume must stay at max
    audio.muted = false;
    volSlider.value = savedVol;
    if (audioGraph) audioGraph.gain.gain.value = savedVol;
    updateMuteUI();

    const eqMap = JSON.parse(localStorage.getItem(EQ_MAP_KEY) || '{}');
    const savedEq = eqMap[name] || { bass: 0, mid: 0, treble: 0 };
    eqBassSlider.value = savedEq.bass;
    eqMidSlider.value = savedEq.mid;
    eqTrebleSlider.value = savedEq.treble;
    applyEqToNodes();

    const speedMap = JSON.parse(localStorage.getItem(SPEED_MAP_KEY) || '{}');
    const savedRate = speedMap[name] !== undefined ? speedMap[name] : 1.0;
    setPlaybackRate(savedRate);

    firedEvents.clear();
    lastTriggeredMarkerTime = null;
    lastTriggeredMarkerIndex = null;

    await refreshEventUI();
    loadABLoop();
    updateMarkerTicks();
    updatePlayPauseUI();
    updateMuteUI();
    updatePlayModeUI();
    audio.play().catch(() => { updatePlayPauseUI(); });

    await renderPlaylist();

    // Auto-scroll to active playlist item (double-rAF to survive loadedmetadata & layout shifts)
    requestAnimationFrame(() => requestAnimationFrame(() => {
        const activeItem = playlistUI.querySelector('.playlist-item.active');
        if (activeItem) scrollIntoGridView(activeItem);
    }));
}

function applyEqToNodes(e) {
    if (e && e.target) {
        let v = parseFloat(e.target.value);
        if (Math.abs(v) <= 0.6) {
            e.target.value = 0;
        }
    }
    
    const b = parseFloat(eqBassSlider.value), m = parseFloat(eqMidSlider.value), t = parseFloat(eqTrebleSlider.value);
    
    function formatEq(val) {
        if (val === 0) return "0";
        if (val === 12) return "+12";
        if (val === -12) return "-12";
        return (val > 0 ? "+" : "") + val.toFixed(1);
    }
    
    document.getElementById('eq-bass-val').textContent = formatEq(b);
    document.getElementById('eq-mid-val').textContent = formatEq(m);
    document.getElementById('eq-treble-val').textContent = formatEq(t);
    
    if (audioGraph) {
        audioGraph.bass.gain.value = b;
        audioGraph.mid.gain.value = m;
        audioGraph.treble.gain.value = t;
    }
    if (currentFileName) {
        const eqMap = JSON.parse(localStorage.getItem(EQ_MAP_KEY) || '{}');
        eqMap[currentFileName] = { bass: b, mid: m, treble: t };
        localStorage.setItem(EQ_MAP_KEY, JSON.stringify(eqMap));
    }
}

[eqBassSlider, eqMidSlider, eqTrebleSlider].forEach(el => el.oninput = applyEqToNodes);

function applyEqPreset(type) {
    let b=0, m=0, t=0;
    if (type==='acoustic') { b=-2; m=4; t=-2; }
    else if (type==='scooped') { b=4; m=-4; t=4; }
    else if (type==='bass') { b=6; m=0; t=-2; }
    else if (type==='treble') { b=-2; m=0; t=6; }
    
    eqBassSlider.value = b; eqMidSlider.value = m; eqTrebleSlider.value = t;
    applyEqToNodes();
}

function escapeHtml(text) {
    const s = String(text ?? '');
    return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function sanitizeMarkerText(text) {
    return String(text ?? '').trim().slice(0, 24);
}

function normalizeMarkerEntry(entry) {
    if (typeof entry === 'number') {
        return { time: entry, preset: 1, text: '' };
    }
    if (!entry || typeof entry !== 'object') {
        return null;
    }

    const time = Number(entry.time);
    if (!Number.isFinite(time)) {
        return null;
    }

    let preset = parseInt(entry.preset, 10);
    if (isNaN(preset)) preset = 1;
    preset = Math.min(100, Math.max(1, preset));

    return {
        time,
        preset,
        text: sanitizeMarkerText(entry.text)
    };
}

function normalizeMarkerList(rawList) {
    if (!Array.isArray(rawList)) return [];
    return rawList
        .map(normalizeMarkerEntry)
        .filter(Boolean)
        .sort((a, b) => a.time - b.time);
}

        version: PLAYSET_STATE_VERSION,
        selectedListId: ALL_SONGS_LIST_ID,
        customPlaysets: createSeedCustomPlaysets(),
        updatedAt: Date.now()
    };
}

function normalizePlaysetState(raw) {
    const fallback = createDefaultPlaysetState();
    if (!raw || typeof raw !== 'object') return fallback;

    const usedIds = new Set();
    const customPlaysets = (Array.isArray(raw.customPlaysets) ? raw.customPlaysets : [])
        .map((setDef, idx) => {
            const idCandidate = String(setDef?.id || '').trim();
            const id = idCandidate && idCandidate !== ALL_SONGS_LIST_ID
                ? idCandidate
                : `set_${Date.now().toString(36)}_${idx}`;
            const name = String(setDef?.name || '').trim();
            if (!name) return null;
            if (usedIds.has(id)) return null;
            usedIds.add(id);
            return {
                id,
                name,
                songNames: normalizeSongNameList(setDef?.songNames),
                createdAt: Number.isFinite(setDef?.createdAt) ? setDef.createdAt : Date.now(),
                updatedAt: Number.isFinite(setDef?.updatedAt) ? setDef.updatedAt : Date.now()
            };
        })
        .filter(Boolean);

    const selectedListIdRaw = String(raw.selectedListId || '').trim();
    const selectedListId = selectedListIdRaw === ALL_SONGS_LIST_ID || customPlaysets.some(p => p.id === selectedListIdRaw)
        ? selectedListIdRaw
        : ALL_SONGS_LIST_ID;

    return {
        version: PLAYSET_STATE_VERSION,
        selectedListId,
        customPlaysets,
        updatedAt: Number.isFinite(raw.updatedAt) ? raw.updatedAt : Date.now()
    };
}

function loadPlaysetState() {
    const serialized = localStorage.getItem(PLAYSET_STATE_KEY);
    if (!serialized) {
        const fallback = createDefaultPlaysetState();
        localStorage.setItem(PLAYSET_STATE_KEY, JSON.stringify(fallback));
        currentPlaysetId = fallback.selectedListId;
        return fallback;
    }

    try {
        const raw = JSON.parse(serialized);
        const state = normalizePlaysetState(raw);
        currentPlaysetId = state.selectedListId;
        return state;
    } catch {
        const fallback = createDefaultPlaysetState();
        localStorage.setItem(PLAYSET_STATE_KEY, JSON.stringify(fallback));
        currentPlaysetId = fallback.selectedListId;
        return fallback;
    }
}

function savePlaysetState(state) {
    const normalized = normalizePlaysetState(state);
    normalized.updatedAt = Date.now();
    localStorage.setItem(PLAYSET_STATE_KEY, JSON.stringify(normalized));
    currentPlaysetId = normalized.selectedListId;
    return normalized;
}

function migratePlaysetStateIfNeeded(songNames) {
    if (!localStorage.getItem(PLAYSET_STATE_KEY)) {
        savePlaysetState(createDefaultPlaysetState());
    }
    return syncPlaysetStateWithSongs(songNames);
}

function syncPlaysetStateWithSongs(songNames) {
    const validSongs = new Set(normalizeSongNameList(songNames));
    const state = loadPlaysetState();
    let changed = false;

    state.customPlaysets = state.customPlaysets.map(setDef => {
        const filtered = normalizeSongNameList(setDef.songNames).filter(song => validSongs.has(song));
        if (filtered.length !== setDef.songNames.length) changed = true;
        if (filtered.some((song, idx) => song !== setDef.songNames[idx])) changed = true;
        return {
            ...setDef,
            songNames: filtered
        };
    });

    if (state.selectedListId !== ALL_SONGS_LIST_ID && !state.customPlaysets.some(setDef => setDef.id === state.selectedListId)) {
        state.selectedListId = ALL_SONGS_LIST_ID;
        changed = true;
    }

    if (changed) return savePlaysetState(state);
    currentPlaysetId = state.selectedListId;
    return state;
}

function getSelectedListId() {
    return loadPlaysetState().selectedListId;
}

function setSelectedListId(id) {
    const state = loadPlaysetState();
    const targetId = String(id || '').trim();
    if (targetId === ALL_SONGS_LIST_ID || state.customPlaysets.some(setDef => setDef.id === targetId)) {
        state.selectedListId = targetId;
    } else {
        state.selectedListId = ALL_SONGS_LIST_ID;
    }
    savePlaysetState(state);
}

function getCustomPlaysets() {
    return loadPlaysetState().customPlaysets.slice();
}

function getAllPlaysetsForUi() {
    return [
        { id: ALL_SONGS_LIST_ID, name: 'All songs', permanent: true },
        ...getCustomPlaysets().map(setDef => ({ id: setDef.id, name: setDef.name, permanent: false }))
    ];
}

function getPlaysetById(playsetId) {
    return getAllPlaysetsForUi().find(setDef => setDef.id === playsetId) || null;
}

function isAllSongsListSelected() {
    return getSelectedListId() === ALL_SONGS_LIST_ID;
}

function getSongsForList(listId) {
    if (listId === ALL_SONGS_LIST_ID) return getAllSongsOrder();
    const setDef = getCustomPlaysets().find(p => p.id === listId);
    return setDef ? setDef.songNames.slice() : [];
}

function getCurrentPlayableOrder() {
    return getSongsForList(getSelectedListId());
}

function createPlaysetId() {
    const existing = new Set(getCustomPlaysets().map(setDef => setDef.id));
    let id = '';
    do {
        id = `set_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 6)}`;
    } while (existing.has(id));
    return id;
}

function isPlaysetNameTaken(name, excludedId = null) {
    const normalized = String(name || '').trim().toLowerCase();
    if (!normalized) return false;
    return getAllPlaysetsForUi().some(setDef => (
        setDef.id !== excludedId &&
        String(setDef.name || '').trim().toLowerCase() === normalized
    ));
}

function createPlayset(name, initialSongNames = []) {
    const trimmedName = String(name || '').trim();
    if (!trimmedName || isPlaysetNameTaken(trimmedName)) return null;

    const allSongs = new Set(getAllSongsOrder());
    const songNames = normalizeSongNameList(initialSongNames).filter(song => allSongs.has(song));

    const state = loadPlaysetState();
    const id = createPlaysetId();
    const now = Date.now();
    state.customPlaysets.push({
        id,
        name: trimmedName,
        songNames,
        createdAt: now,
        updatedAt: now
    });
    savePlaysetState(state);
    return id;
}

function updatePlayset(playsetId, patch = {}) {
    if (!playsetId || playsetId === ALL_SONGS_LIST_ID) return false;

    const state = loadPlaysetState();
    const setDef = state.customPlaysets.find(p => p.id === playsetId);
    if (!setDef) return false;

    if (patch.name !== undefined) {
        const trimmedName = String(patch.name || '').trim();
        if (!trimmedName || isPlaysetNameTaken(trimmedName, playsetId)) return false;
        setDef.name = trimmedName;
    }

    if (patch.songNames !== undefined) {
        const allowed = new Set(getAllSongsOrder());
        setDef.songNames = normalizeSongNameList(patch.songNames).filter(song => allowed.has(song));
    }

    setDef.updatedAt = Date.now();
    savePlaysetState(state);
    return true;
}

function deletePlayset(playsetId) {
    if (!playsetId || playsetId === ALL_SONGS_LIST_ID) return false;
    const state = loadPlaysetState();
    const next = state.customPlaysets.filter(setDef => setDef.id !== playsetId);
    if (next.length === state.customPlaysets.length) return false;
    state.customPlaysets = next;
    if (state.selectedListId === playsetId) state.selectedListId = ALL_SONGS_LIST_ID;
    savePlaysetState(state);
    return true;
}

function addSongToPlayset(playsetId, songName) {
    if (!playsetId || playsetId === ALL_SONGS_LIST_ID || !songName) return false;

    const state = loadPlaysetState();
    const setDef = state.customPlaysets.find(p => p.id === playsetId);
    if (!setDef) return false;

    const allowed = new Set(getAllSongsOrder());
    if (!allowed.has(songName)) return false;
    if (!setDef.songNames.includes(songName)) setDef.songNames.push(songName);
    setDef.updatedAt = Date.now();
    savePlaysetState(state);
    return true;
}

function removeSongFromPlayset(playsetId, songName) {
    if (!playsetId || playsetId === ALL_SONGS_LIST_ID || !songName) return false;
    const state = loadPlaysetState();
    const setDef = state.customPlaysets.find(p => p.id === playsetId);
    if (!setDef) return false;
    const before = setDef.songNames.length;
    setDef.songNames = setDef.songNames.filter(song => song !== songName);
    if (before !== setDef.songNames.length) {
        setDef.updatedAt = Date.now();
        savePlaysetState(state);
        return true;
    }
    return false;
}

function renameSongReferencesInPlaysets(oldName, newName) {
    if (!oldName || !newName || oldName === newName) return;
    const state = loadPlaysetState();
    let changed = false;

    state.customPlaysets = state.customPlaysets.map(setDef => {
        const mapped = setDef.songNames.map(song => (song === oldName ? newName : song));
        const deduped = normalizeSongNameList(mapped);
        if (deduped.length !== setDef.songNames.length || deduped.some((song, idx) => song !== setDef.songNames[idx])) {
            changed = true;
            return { ...setDef, songNames: deduped, updatedAt: Date.now() };
        }
        return setDef;
    });

    if (changed) savePlaysetState(state);
}

function removeSongReferencesFromPlaysets(songName) {
    if (!songName) return;
    const state = loadPlaysetState();
    let changed = false;

    state.customPlaysets = state.customPlaysets.map(setDef => {
        const nextSongs = setDef.songNames.filter(song => song !== songName);
        if (nextSongs.length !== setDef.songNames.length) {
            changed = true;
            return { ...setDef, songNames: nextSongs, updatedAt: Date.now() };
        }
        return setDef;
    });

    if (changed) savePlaysetState(state);
}

function moveInCustomPlaysetOrder(playsetId, from, to) {
    if (!playsetId || playsetId === ALL_SONGS_LIST_ID) return;
    const state = loadPlaysetState();
    const setDef = state.customPlaysets.find(p => p.id === playsetId);
    if (!setDef) return;

    const order = setDef.songNames.slice();
    if (from < 0 || to < 0 || from >= order.length || to >= order.length || from === to) return;
    const item = order.splice(from, 1)[0];
    if (!item) return;
    order.splice(to, 0, item);

    setDef.songNames = order;
    setDef.updatedAt = Date.now();
    savePlaysetState(state);
}

function moveInCurrentListOrder(from, to) {
    const selected = getSelectedListId();
    if (selected === ALL_SONGS_LIST_ID) {
        moveInOrder(from, to);
        return;
    }
    moveInCustomPlaysetOrder(selected, from, to);
}

function moveInPlaysetOrder(from, to) {
    const state = loadPlaysetState();
    const order = state.customPlaysets.slice();
    if (!Array.isArray(order) || from < 0 || to < 0 || from >= order.length || from === to) return;
    const boundedTo = Math.min(to, order.length - 1);
    const item = order.splice(from, 1)[0];
    if (!item) return;
    order.splice(boundedTo, 0, item);
    state.customPlaysets = order;
    savePlaysetState(state);
}

function makePlaysetNameUnique(desiredName, existingNames) {
    const existingLower = new Set(existingNames.map(name => String(name || '').trim().toLowerCase()));
    let base = String(desiredName || '').trim();
    if (!base) base = 'Imported Playset';
    if (!existingLower.has(base.toLowerCase())) return base;
    let counter = 1;
    let candidate = '';
    do {
        candidate = `${base} (${counter})`;
        counter++;
    } while (existingLower.has(candidate.toLowerCase()));
    return candidate;
}

function splitPlaysetSongsByAvailability(songNames, availableSongsSet) {
    const existingSet = availableSongsSet instanceof Set
        ? availableSongsSet
        : new Set(normalizeSongNameList(availableSongsSet));
    const source = normalizeSongNameList(songNames);
    const keptSongNames = [];
    const skippedSongNames = [];

    source.forEach(songName => {
        if (existingSet.has(songName)) keptSongNames.push(songName);
        else skippedSongNames.push(songName);
    });

    return { keptSongNames, skippedSongNames };
}

function buildSkippedSongsMessage(contextLabel, skippedSongNames) {
    if (!Array.isArray(skippedSongNames) || skippedSongNames.length === 0) return '';
    const maxInline = 10;
    const shown = skippedSongNames.slice(0, maxInline);
    const more = skippedSongNames.length - shown.length;
    const list = shown.map(name => `- ${name}`).join('\n');
    const heading = `${contextLabel}: ${skippedSongNames.length} missing song(s) skipped.`;
    const tail = more > 0 ? `\n\n...and ${more} more.` : '';
    return `${heading}\n\n${list}${tail}`;
}

function alertSkippedSongs(contextLabel, skippedSongNames) {
    const message = buildSkippedSongsMessage(contextLabel, skippedSongNames);
    if (message) alert(message);
}

function getCustomPlaysetById(playsetId) {
    return getCustomPlaysets().find(setDef => setDef.id === playsetId) || null;
}

function sanitizeFilename(name, fallback) {
    const cleaned = String(name || fallback || 'export').replace(/[^a-zA-Z0-9._\-() ]/g, '_').trim();
    return cleaned || fallback || 'export';
}

async function tryNativeShareFile(file, options = {}) {
    if (!navigator.share || typeof File === 'undefined') {
        return { status: 'unsupported' };
    }

    const shareData = {
        files: [file],
        title: options.title || file.name,
        text: options.text || ''
    };

    try {
        if (typeof navigator.canShare === 'function' && !navigator.canShare({ files: [file] })) {
            return { status: 'unsupported' };
        }
        await navigator.share(shareData);
        return { status: 'shared' };
    } catch (err) {
        if (err && err.name === 'AbortError') return { status: 'cancelled' };
        return { status: 'error', error: err };
    }
}

async function exportPlaysetById(playsetId, options = {}) {
    showIoBusy('Exporting playset...');
    try {
    const showFolderNotice = options.showFolderNotice !== false;
    const setDef = getCustomPlaysetById(playsetId);
    if (!setDef) return false;

    const payload = {
        version: 1,
        name: setDef.name,
        songNames: setDef.songNames.slice(),
        createdAt: setDef.createdAt || Date.now(),
        updatedAt: setDef.updatedAt || Date.now()
    };

    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const fileName = `${sanitizeFilename(setDef.name, 'playset')}.aeps`;
    const shareRequested = options.share === true;

    if (shareRequested) {
        const file = new File([blob], fileName, { type: 'application/json', lastModified: Date.now() });
        const shareResult = await tryNativeShareFile(file, {
            title: `Share playset: ${setDef.name}`,
            text: fileName
        });
        if (shareResult.status === 'shared') return true;
        if (shareResult.status === 'cancelled') return false;
        if (shareResult.status === 'unsupported') {
            alert('Sharing files is not supported in this browser.');
            return false;
        }
        alert(`Share failed: ${shareResult.error?.message || 'Unknown error'}`);
        return false;
    }

    const settings = loadUiSettings();

    if (settings.overwritePlaysetsOnExport && window.showDirectoryPicker) {
        try {
            if (!lastExportDirHandle) {
                lastExportDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            }
            if (lastExportDirHandle) {
                const fileHandle = await lastExportDirHandle.getFileHandle(fileName, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(blob);
                await writable.close();
                if (showFolderNotice) showExportNotice(`Exported to folder: ${getExportFolderName()}`);
                return true;
            }
        } catch (err) {
            if (err.name === 'AbortError') return false;
            lastExportDirHandle = null;
            updateExportFolderLabelInInfoSheet();
        }
    }

    if (window.showSaveFilePicker) {
        try {
            const opts = {
                suggestedName: fileName,
                types: [{ description: 'Audio Events Playset', accept: { 'application/json': ['.aeps'] } }]
            };
            const startIn = getPickerStartIn(lastExportPickerHandle);
            if (startIn) opts.startIn = startIn;
            const handle = await window.showSaveFilePicker(opts);
            lastExportPickerHandle = handle;
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return true;
        } catch (err) {
            if (err.name === 'AbortError') return false;
        }
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    return true;
    } finally {
        hideIoBusy();
    }
}

async function importPlaysetDefinitionFile(file) {
    showIoBusy('Importing playset...');
    try {
    if (!file) return false;
    let payload = null;

    try {
        const text = await file.text();
        payload = JSON.parse(text);
    } catch {
        alert('Import failed: invalid playset file.');
        return false;
    }

    const importedName = String(payload?.name || '').trim();
    if (!importedName) {
        alert('Import failed: missing playset name.');
        return false;
    }

    const allowedSongs = new Set(getAllSongsOrder());
    const { keptSongNames: filteredSongs, skippedSongNames } = splitPlaysetSongsByAvailability(
        payload?.songNames,
        allowedSongs
    );

    const state = loadPlaysetState();
    const existingNames = state.customPlaysets.map(setDef => setDef.name);

    const settings = loadUiSettings();
    let finalName = importedName;
    const hasNameCollision = existingNames.some(name => name.trim().toLowerCase() === importedName.toLowerCase());
    if (hasNameCollision && !settings.overwritePlaysetsOnImport) {
        const suggestedName = makePlaysetNameUnique(importedName, existingNames);
        const userInput = prompt(
            `"${importedName}" already exists.\n\nEnter a new name, or press OK to use the suggested alternative:`,
            suggestedName
        );
        if (userInput === null) return false;
        finalName = String(userInput || '').trim();
        if (!finalName) return false;
    }

    const existingByFinalName = state.customPlaysets.find(
        setDef => setDef.name.trim().toLowerCase() === finalName.toLowerCase()
    );
    if (existingByFinalName) {
        existingByFinalName.name = finalName;
        existingByFinalName.songNames = filteredSongs;
        existingByFinalName.updatedAt = Date.now();
        savePlaysetState(state);
    } else {
        createPlayset(finalName, filteredSongs);
    }

    alertSkippedSongs(`Playset \"${finalName}\" imported`, skippedSongNames);
    return true;
    } finally {
        hideIoBusy();
    }
}

let playsetImportInput = null;
function ensurePlaysetImportInput() {
    if (playsetImportInput) return playsetImportInput;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.aeps,application/json';
    input.style.display = 'none';
    input.addEventListener('click', () => { input.value = ''; });
    input.addEventListener('change', async () => {
        const file = input.files?.[0];
        input.value = '';
        if (!file) return;
        const imported = await importPlaysetDefinitionFile(file);
        if (imported) {
            updatePlaysetLabel();
            renderPlaysetSheet();
            await renderPlaylist();
        }
    });
    document.body.appendChild(input);
    playsetImportInput = input;
    return playsetImportInput;
}

async function promptImportPlaysetDefinition() {
    if (window.showOpenFilePicker) {
        try {
            const opts = {
                multiple: false,
                types: [{ description: 'Audio Events Playset', accept: { 'application/json': ['.aeps'] } }]
            };
            const startIn = getPickerStartIn(lastImportPickerHandle);
            if (startIn) opts.startIn = startIn;
            const [handle] = await window.showOpenFilePicker(opts);
            if (!handle) return;
            lastImportPickerHandle = handle;
            const file = await handle.getFile();
            const imported = await importPlaysetDefinitionFile(file);
            if (imported) {
                updatePlaysetLabel();
                renderPlaysetSheet();
                await renderPlaylist();
            }
            return;
        } catch (err) {
            if (err.name === 'AbortError') return;
        }
    }

    ensurePlaysetImportInput().click();
}

async function removeSongFromCurrentPlaysetByName(songName) {
    const selected = getSelectedListId();
    if (selected === ALL_SONGS_LIST_ID) return false;
    if (!songName) return false;
    if (!confirm(`Remove ${songName} from ${getCurrentPlayset().name}?`)) return false;
    const removed = removeSongFromPlayset(selected, songName);
    if (removed) {
        await renderPlaylist();
    }
    return removed;
}

const playsetModalState = {
    mode: null,
    sourceSongName: '',
    anchorEl: null,
    draft: null
};

function getCurrentPlayset() {
    const selected = getSelectedListId();
    currentPlaysetId = selected;
    return getPlaysetById(selected) || { id: ALL_SONGS_LIST_ID, name: 'All songs', permanent: true };
}

function getAllKnownSongNamesForUi() {
    const fromOrder = getAllSongsOrder();
    if (fromOrder.length) return fromOrder;

    const fromCustom = getCustomPlaysets()
        .flatMap(setDef => setDef.songNames || [])
        .filter(Boolean);
    if (fromCustom.length) return normalizeSongNameList(fromCustom);

    return [];
}

function getEditablePlaysetId(defaultId) {
    if (defaultId && defaultId !== ALL_SONGS_LIST_ID && getCustomPlaysets().some(p => p.id === defaultId)) {
        return defaultId;
    }
    const exact = getCustomPlaysets().find(p => p.id === defaultId);
    if (exact) return exact.id;
    const fallback = getCustomPlaysets()[0];
    return fallback ? fallback.id : null;
}

function createDraftFromPlayset(playsetId, { prefillSong = '' } = {}) {
    const allSongs = getAllKnownSongNamesForUi();
    const selected = playsetId ? getCustomPlaysetById(playsetId) : null;
    const baseSongs = playsetId ? getSongsForList(playsetId).slice() : [];
    if (prefillSong && !baseSongs.includes(prefillSong)) baseSongs.push(prefillSong);

    return {
        playsetId,
        name: selected ? selected.name : '',
        songs: baseSongs,
        availableSongs: allSongs
    };
}

function getPlaysetAnchorForMode(mode, fallbackAnchor = null) {
    const topBarAnchor = document.getElementById('mobileMidiBar');
    const headerAnchor = document.querySelector('.card-playlist .header-row');
    if (mode === 'add-to' || mode === 'edit' || mode === 'new') {
        return topBarAnchor || headerAnchor;
    }
    return fallbackAnchor || headerAnchor;
}

function capturePlaysetScrollState(sheet) {
    const sheetList = sheet?.querySelector('.marker-set-sheet-list');
    const addPicker = sheet?.querySelector('.playset-add-picker');
    return {
        listDistanceFromBottom: sheetList
            ? (sheetList.scrollHeight - sheetList.scrollTop - sheetList.clientHeight)
            : null,
        pickerScrollTop: addPicker ? addPicker.scrollTop : null
    };
}

function restorePlaysetScrollState(sheet, state) {
    if (!sheet || !state) return;

    const nextSheetList = sheet.querySelector('.marker-set-sheet-list');
    if (nextSheetList && state.listDistanceFromBottom !== null) {
        const nextTop = nextSheetList.scrollHeight - nextSheetList.clientHeight - state.listDistanceFromBottom;
        nextSheetList.scrollTop = Math.max(0, nextTop);
    }

    const nextAddPicker = sheet.querySelector('.playset-add-picker');
    if (nextAddPicker && state.pickerScrollTop !== null) {
        const maxPickerTop = Math.max(0, nextAddPicker.scrollHeight - nextAddPicker.clientHeight);
        nextAddPicker.scrollTop = Math.min(state.pickerScrollTop, maxPickerTop);
    }
}

function openPlaysetModal({ mode, playsetId = null, songName = '', anchorEl = null } = {}) {
    const sheet = document.getElementById('playset-sheet');
    const overlay = document.getElementById('sheetOverlay');
    if (!sheet || !overlay) return;

    const currentMode = mode || 'selector';

    playsetModalState.mode = currentMode;
    playsetModalState.sourceSongName = songName || '';
    playsetModalState.anchorEl = getPlaysetAnchorForMode(currentMode, anchorEl);

    if (currentMode === 'selector') {
        playsetModalState.draft = null;
    } else if (currentMode === 'add-to') {
        playsetModalState.draft = null;
    } else if (currentMode === 'new') {
        playsetModalState.draft = createDraftFromPlayset(null, { prefillSong: songName || '' });
    } else {
        const editableId = getEditablePlaysetId(playsetId || getSelectedListId());
        if (!editableId) {
            playsetModalState.mode = 'new';
            playsetModalState.draft = createDraftFromPlayset(null, { prefillSong: songName || '' });
        } else {
            playsetModalState.draft = createDraftFromPlayset(editableId);
        }
    }

    document.querySelectorAll('.action-sheet').forEach(panel => panel.classList.remove('open'));
    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
    const songSheet = document.getElementById('song-menu-sheet');
    if (songSheet) songSheet.classList.remove('open');
    const markerSheet = document.getElementById('marker-set-sheet');
    if (markerSheet) markerSheet.classList.remove('open');
    const markerMenuSheet = document.getElementById('marker-menu-sheet');
    if (markerMenuSheet) markerMenuSheet.classList.remove('open');
    const infoSheet = document.getElementById('info-sheet');
    if (infoSheet) infoSheet.classList.remove('open');

    renderPlaysetSheet();
    positionPlaysetSheet();
    sheet.classList.add('open');
    overlay.classList.add('open');
}

            <div class="playset-modal-song-row">
                <span>${escapeHtml(song)}</span>

                    <span>${escapeHtml(song)}</span>
                    <button type="button" class="playset-icon-btn add" data-playset-action="add-song" data-song-name="${escapeHtml(song)}" aria-label="Add song" title="Add song"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3" ry="3" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></svg></button>

        bodyHtml = `
            <div class="marker-set-sheet-list">
                <div class="playset-modal-body">
                    <div class="playset-modal-title-row">
                        <div class="playset-modal-title">${title}</div>

                    <div class="playset-modal-section-title">Songs In Playset</div>
                    <div class="playset-modal-song-list">${songRows || '<div class="playset-modal-empty">No songs yet.</div>'}</div>
                    <div class="playset-modal-section-title">Add Songs</div>

        const saveDisabled = !draft.name.trim() ? ' disabled' : '';
        footerHtml = `

    sheet.innerHTML = `${bodyHtml}${footerHtml}`;

            const rowEl = e.target.closest('[data-playset-id]');
            const actionEl = e.target.closest('[data-playset-action]');
            const targetEl = e.target.closest('[data-playset-target]');

            if (rowEl && (!playsetModalState.mode || playsetModalState.mode === 'selector')) {
                if (playsetRecentlyDragged) return;
                if (e.target.closest('.playset-drag-handle')) return;
                setSelectedListId(rowEl.dataset.playsetId);
                updatePlaysetLabel();
                if (shouldAutoClosePlaysetSheetOnSelect() || getSelectedListId() === ALL_SONGS_LIST_ID) {
                    closeAllSheets();
                    await renderPlaylist();
                    return;
                }
                renderPlaysetSheet();
                await renderPlaylist();
                return;
            }

            if (targetEl && playsetModalState.mode === 'add-to') {
                const targetId = targetEl.dataset.playsetTarget;
                const song = playsetModalState.sourceSongName;
                if (targetId && song) {
                    addSongToPlayset(targetId, song);
                }
                updatePlaysetLabel();
                closeAllSheets();
                return;
            }

            if (!actionEl) return;
            const action = actionEl.dataset.playsetAction;

            if (action === 'close') {
                closeAllSheets();
                return;
            }

            if (!playsetModalState.mode || playsetModalState.mode === 'selector') {
                if (action === 'edit') {
                    openPlaysetModal({
                        mode: 'edit',
                        playsetId: getSelectedListId(),
                        anchorEl: playsetModalState.anchorEl
                    });
                    return;
                }
                if (action === 'import') {
                    await promptImportPlaysetDefinition();
                    return;
                }
                if (action === 'new') {
                    openPlaysetModal({
                        mode: 'new',
                        anchorEl: playsetModalState.anchorEl
                    });
                    return;
                }
                if (action === 'export') {
                    const current = getCurrentPlayset();
                    if (current && !current.permanent) {
                        await exportPlaysetById(current.id);
                    }
                    return;
                }
                if (action === 'share') {
                    const current = getCurrentPlayset();
                    if (current && !current.permanent) {
                        await exportPlaysetById(current.id, { share: true });
                    }
                    return;
                }
                if (action === 'delete') {
                    const current = getCurrentPlayset();
                    if (!current || current.permanent) return;
                    if (!confirm(`Delete playset "${current.name}"?`)) return;
                    deletePlayset(current.id);
                    updatePlaysetLabel();
                    renderPlaysetSheet();
                    await renderPlaylist();
                    return;
                }
            }

            if (playsetModalState.mode === 'add-to') {
                if (action === 'new') {
                    openPlaysetModal({
                        mode: 'new',
                        songName: playsetModalState.sourceSongName,
                        anchorEl: playsetModalState.anchorEl
                    });
                }
                return;
            }

            const draft = playsetModalState.draft;
            if (!draft) return;

            if (action === 'remove-song') {
                const idx = Number(actionEl.dataset.songIndex);
                if (Number.isInteger(idx) && idx >= 0 && idx < draft.songs.length) {
                    const scrollState = capturePlaysetScrollState(sheet);

                    draft.songs.splice(idx, 1);
                    renderPlaysetSheet();
                    restorePlaysetScrollState(sheet, scrollState);
                }
                return;
            }

            if (action === 'add-song') {
                const song = actionEl.dataset.songName || '';
                if (song && !draft.songs.includes(song)) {
                    const scrollState = capturePlaysetScrollState(sheet);

                    draft.songs.push(song);
                    renderPlaysetSheet();
                    restorePlaysetScrollState(sheet, scrollState);
                }
                return;
            }

            if (action === 'save') {
                const name = draft.name.trim();
                if (!name) return;

                const editingId = playsetModalState.mode === 'new' ? null : draft.playsetId;
                if (isPlaysetNameTaken(name, editingId)) {
                    alert(`A playset named "${name}" already exists.`);
                    return;
                }

                if (playsetModalState.mode === 'new') {
                    const id = createPlayset(name, draft.songs.slice());
                    if (!id) return;
                    setSelectedListId(id);
                } else {
                    const updated = updatePlayset(draft.playsetId, { name, songNames: draft.songs.slice() });
                    if (!updated) return;
                    setSelectedListId(draft.playsetId);
                }

                updatePlaysetLabel();
                closeAllSheets();
                await renderPlaylist();
                return;
            }
        });

        sheet.addEventListener('input', (e) => {
            const inputEl = e.target.closest('[data-playset-input]');
            if (!inputEl) return;

            const key = inputEl.dataset.playsetInput;
            if (key === 'name') {
                if (playsetModalState.draft) {
                    playsetModalState.draft.name = inputEl.value;
                    const saveBtn = sheet.querySelector('[data-playset-action="save"]');
                    if (saveBtn) saveBtn.disabled = !playsetModalState.draft.name.trim();
                }
            }
        });

        sheet.addEventListener('pointerdown', onPlaysetSheetPointerDown);

        sheet.dataset.bound = '1';
    }

    if (sheet.classList.contains('open')) positionPlaysetSheet();
}

function positionPlaysetSheet() {
    const sheet = document.getElementById('playset-sheet');
    const anchor = playsetModalState.anchorEl || document.querySelector('.card-playlist .header-row');
    if (!sheet || !anchor || !anchor.isConnected) return;

    const headerRect = anchor.getBoundingClientRect();
    const top = Math.max(0, Math.round(headerRect.bottom));
    const rootStyles = getComputedStyle(document.documentElement);
    const playerBarH = parseFloat(rootStyles.getPropertyValue('--mobile-playerbar-height')) || 160;
    const tabBarH = parseFloat(rootStyles.getPropertyValue('--mobile-tab-height')) || 56;
    const maxHeight = Math.max(320, Math.floor(window.innerHeight - top - playerBarH - tabBarH - 10));

    sheet.style.top = `${top}px`;
    sheet.style.maxHeight = `${maxHeight}px`;
}

function togglePlaysetDropdown(e) {
    if (e) e.stopPropagation();
    const sheet = document.getElementById('playset-sheet');
    if (!sheet) return;

    const isOpen = sheet.classList.contains('open');
    if (isOpen) {
        closeAllSheets();
        return;
    }

    openPlaysetModal({
        mode: 'selector',
        anchorEl: getPlaysetAnchorForMode('selector')
    });
}

/* -------------------------- Markers (with preset) ------------------------ */
let currentMarkerSetId = 'default';

function getRawMarkerData(songName) {
    const map = JSON.parse(localStorage.getItem(EVENT_MAP_KEY) || '{}');
    let data = map[songName];
    if (!data) return { activeId: 'default', sets: { default: { name: 'Default Set', events: [] } } };
    
    // Auto-migrate from array to object
    if (Array.isArray(data)) {
        data = {
            activeId: 'default',
            sets: {
                default: { name: 'Default Set', events: data }
            }
        };
        map[songName] = data;
        localStorage.setItem(EVENT_MAP_KEY, JSON.stringify(map));
    }
    
    // Safety fallback
    if (!data.sets || Object.keys(data.sets).length === 0) {
        data.sets = { default: { name: 'Default Set', events: [] } };
        data.activeId = 'default';
    }
    if (!data.sets[data.activeId]) {
        data.activeId = Object.keys(data.sets)[0];
    }
    
    return data;
}

function saveRawMarkerData(songName, data) {
    if (!songName) return;
    const map = JSON.parse(localStorage.getItem(EVENT_MAP_KEY) || '{}');
    for (const key in data.sets) {
        data.sets[key].events = normalizeMarkerList(data.sets[key].events || []);
    }
    map[songName] = data;
    localStorage.setItem(EVENT_MAP_KEY, JSON.stringify(map));
}

function getEvents() {
    if (!currentFileName) return [];
    let data = getRawMarkerData(currentFileName);
    currentMarkerSetId = data.activeId;
    updateSetSelector(data);
    return data.sets[data.activeId].events;
}

function saveEvents(list) {
    if (!currentFileName) return;
    let data = getRawMarkerData(currentFileName);
    data.sets[data.activeId].events = normalizeMarkerList(list);
    saveRawMarkerData(currentFileName, data);
}

function updateSetSelector(data) {
    const label = document.getElementById('marker-set-label');
    if (label && data.sets[data.activeId]) {
        label.textContent = data.sets[data.activeId].name;
    }
    const sheet = document.getElementById('marker-set-sheet');
    if (!sheet) return;

    const rows = Object.entries(data.sets).map(([id, setDef]) => {
        const activeClass = id === data.activeId ? ' active' : '';
        return `<button type="button" class="speed-option marker-set-row${activeClass}" data-set-id="${escapeHtml(id)}">${escapeHtml(setDef.name)}</button>`;
    }).join('');

    sheet.innerHTML = `
        <div class="marker-set-sheet-list">${rows}</div>
        <div class="marker-set-sheet-divider"></div>
        <div class="marker-set-sheet-footer">
            <button type="button" class="speed-chip marker-set-chip" data-marker-action="new" aria-label="New marker set" title="New marker set"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3" ry="3" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></svg></button>
            <button type="button" class="speed-chip marker-set-chip" data-marker-action="duplicate" aria-label="Duplicate marker set" title="Duplicate marker set"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2" /><rect x="4" y="4" width="11" height="11" rx="2" /></svg></button>
            <button type="button" class="speed-chip marker-set-chip" data-marker-action="rename" aria-label="Rename marker set" title="Rename marker set"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" /></svg></button>
            <div class="speed-chip marker-set-chip marker-set-chip-spacer" aria-hidden="true"></div>
            <button type="button" class="speed-chip marker-set-chip danger" data-marker-action="delete" aria-label="Delete marker set" title="Delete marker set"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></svg></button>
        </div>
    `;

    if (!sheet.dataset.bound) {
        sheet.addEventListener('click', (e) => {
            e.stopPropagation();
            const setRow = e.target.closest('[data-set-id]');
            if (setRow) {
                changeMarkerSet(setRow.dataset.setId);
                if (shouldAutoCloseMarkerSetSheetOnSelect()) {
                    closeAllSheets();
                }
                return;
            }

            const actionEl = e.target.closest('[data-marker-action]');
            if (!actionEl) return;

            const action = actionEl.dataset.markerAction;
            if (action === 'new') newMarkerSet();
            else if (action === 'duplicate') duplicateMarkerSet();
            else if (action === 'rename') renameMarkerSet();
            else if (action === 'delete') deleteMarkerSet();
        });
        sheet.dataset.bound = '1';
    }

    if (sheet.classList.contains('open')) {
        positionMarkerSetSheet();
    }
}

function positionMarkerSetSheet() {
    const sheet = document.getElementById('marker-set-sheet');
    const header = document.querySelector('.card-events .markers-header');
    if (!sheet || !header) return;

    const headerRect = header.getBoundingClientRect();
    const top = Math.max(0, Math.round(headerRect.bottom));
    const rootStyles = getComputedStyle(document.documentElement);

function nearestMarkerAtOrBefore(time, epsilon = EPS_RECONCILE) {
    const events = getEvents();
    if (!events.length) return null;
    const candidates = events.map((evt, i) => ({ ...evt, i })).filter(e => e.time <= time + epsilon);
    if (!candidates.length) return null;
    return candidates.reduce((best, e) =>
        Math.abs(e.time - time) < Math.abs(best.time - time) ? e : best
    );
}

/* =================== Reconciliation (scrub/rewind/forward) ================== */
function reconcileMarkersOnBackwardJump(targetTime, prevTime) {
    const events = getEvents();
    if (!events.length) return;

    events.forEach((evt, i) => {
        const t = evt.time;
        if (t > targetTime && t <= prevTime) {
            firedEvents.delete(t);
            updateTickFiredClassByIndex(i, false);
        }
    });

    const nearest = nearestMarkerAtOrBefore(targetTime, EPS_RECONCILE);
    if (nearest) {
        fireMarkerByIndex(nearest.i, nearest, { forceCc: true });
    } else {
        lastTriggeredMarkerTime = null;
        lastTriggeredMarkerIndex = null;
        progressBar.querySelectorAll('.progress-tick').forEach(el => el.classList.remove('current'));
        document.querySelectorAll('#event-list li').forEach(el => el.classList.remove('active-event'));
    }
}
function reconcileMarkersOnForwardJump(prevTime, targetTime) {
    const events = getEvents();
    if (!events.length) return;

    events.forEach((evt, i) => {
        const t = evt.time;
        if (t >= prevTime && t <= targetTime) {
            firedEvents.add(t);
            updateTickFiredClassByIndex(i, true);
        }
    });

    const nearest = nearestMarkerAtOrBefore(targetTime, EPS_RECONCILE);
    if (nearest) {
        fireMarkerByIndex(nearest.i, nearest, { forceCc: true });
    } else {
        lastTriggeredMarkerTime = null;
        lastTriggeredMarkerIndex = null;
        progressBar.querySelectorAll('.progress-tick').forEach(el => el.classList.remove('current'));
        document.querySelectorAll('#event-list li').forEach(el => el.classList.remove('active-event'));
    }
}
function reconcileMarkersOnLoopRewind(loopStartA, loopEndB) {
    reconcileMarkersOnBackwardJump(loopStartA, loopEndB);
}

audio.addEventListener('timeupdate', () => {
    const now = audio.currentTime;

    let fireNow = now;
    if (abLoop.enabled && abLoop.visible && isABValid()) {
        fireNow = Math.min(now, abLoop.b);
    }

    getEvents().forEach((evt, i) => {
        const t = evt.time;
        if (!firedEvents.has(t) && fireNow >= t) {
            fireMarkerByIndex(i, evt, { forceCc: false });
        }
        if (now < t - 0.5) { firedEvents.delete(t); updateTickFiredClassByIndex(i, false); }
        if (audio.loop && !audio.paused && now === 0.0 && t === 0.0) { firedEvents.delete(t); updateTickFiredClassByIndex(i, false); }
    });

    updateProgressUI();

    if (abLoop.enabled && abLoop.visible && isABValid()) {
        if (now >= (abLoop.b - EPS_LOOP_B)) {
            reconcileMarkersOnLoopRewind(abLoop.a, abLoop.b);
            audio.currentTime = abLoop.a;
            if (audio.paused) {
                audio.play().catch(() => { updatePlayPauseUI(); });
            }
            updatePlayPauseUI();
        }
    }
});

/* =================== Tab switching with view transitions ================= */
const TAB_IDS = ['tab-playlist', 'tab-events'];
let currentTabIndex = 0;
const tabScrollTop = { 0: 0, 1: 0 };

function saveCurrentTabScroll() {
    const grid = document.querySelector('.grid');
    if (!grid) return;
    tabScrollTop[currentTabIndex] = grid.scrollTop;
}

function restoreTabScroll(tabIndex) {
    const grid = document.querySelector('.grid');
    if (!grid) return;
    grid.scrollTop = tabScrollTop[tabIndex] || 0;
}

function getMarkerFocusIndex() {
    const events = getEvents();
    if (!events.length) return null;

    if (Number.isInteger(lastTriggeredMarkerIndex)
        && lastTriggeredMarkerIndex >= 0
        && lastTriggeredMarkerIndex < events.length) {
        return lastTriggeredMarkerIndex;
    }

    const nearest = nearestMarkerAtOrBefore(audio.currentTime, EPS_RECONCILE);
    if (nearest) return nearest.i;

    return 0;
}

function ensureTabFocusVisible(tabIndex) {
    if (tabIndex === 0) {
        const activeItem = playlistUI.querySelector('.playlist-item.active');
        if (activeItem) scrollIntoGridView(activeItem);
        return;
    }

    const focusIdx = getMarkerFocusIndex();
    if (focusIdx === null) return;
    setActiveMarkerUIByIndex(focusIdx, true);
}

function switchTab(newIndex) {
    if (newIndex === currentTabIndex) {
        requestAnimationFrame(() => ensureTabFocusVisible(newIndex));
        return;
    }

    saveCurrentTabScroll();

    const radio = document.getElementById(TAB_IDS[newIndex]);
    if (!radio) return;

    if (!document.startViewTransition) {
        radio.checked = true;
        currentTabIndex = newIndex;
        measureStickyTitle();
        restoreTabScroll(newIndex);
        requestAnimationFrame(() => ensureTabFocusVisible(newIndex));
        return;
    }

    const directionClass = newIndex > currentTabIndex ? 'slide-forward' : 'slide-backward';
    document.documentElement.classList.add(directionClass);

    const transition = document.startViewTransition(() => {
        radio.checked = true;
        currentTabIndex = newIndex;
    });

    transition.finished.finally(() => {
        document.documentElement.classList.remove(directionClass);
        measureStickyTitle();
        restoreTabScroll(newIndex);
        requestAnimationFrame(() => ensureTabFocusVisible(newIndex));
    });
}

function measureStickyTitle() {
    const el = document.getElementById('current-title');
    if (el && el.offsetHeight > 0) {
        document.documentElement.style.setProperty('--sticky-title-height', el.offsetHeight + 'px');
    }
}

/* Scroll an element into view within the .grid scroll container if it's clipped */
function scrollIntoGridView(el) {
    const grid = document.querySelector('.grid');
    if (!grid || !el) return;
    const elRect = el.getBoundingClientRect();
    // Skip hidden elements (inside display:none tab) — they report all zeros
    if (elRect.width === 0 && elRect.height === 0) return;
    const gridRect = grid.getBoundingClientRect();
    // Account for sticky headers overlapping from the top
    const stickyBottom = getStickyBottomEdge(el, gridRect.top);
    if (elRect.bottom > gridRect.bottom) {
        grid.scrollTop += elRect.bottom - gridRect.bottom;
    } else if (elRect.top < stickyBottom) {
        grid.scrollTop -= stickyBottom - elRect.top;
    }
}

/* Get the bottom edge of the lowest sticky header in the current tab */
function getStickyBottomEdge(el, gridTop) {
    const card = el.closest('.card');
    if (!card) return gridTop;
    const stickies = card.querySelectorAll('.header-row, #current-title, .markers-header');
    let bottom = gridTop;
    stickies.forEach(s => {
        const r = s.getBoundingClientRect();
        if (r.height > 0 && r.bottom > bottom) bottom = r.bottom;
    });
    return bottom;
}

/* Scroll the active item on whichever tab is currently visible */
function scrollActiveItemIntoView() {
    const playlistTab = document.getElementById('tab-playlist');
    if (playlistTab && playlistTab.checked) {
        const item = playlistUI.querySelector('.playlist-item.active');
        if (item) scrollIntoGridView(item);
    } else {
        const focusIdx = getMarkerFocusIndex();
        if (focusIdx !== null) setActiveMarkerUIByIndex(focusIdx, true);
    }
}

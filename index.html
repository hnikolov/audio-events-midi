
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f0f0f" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>Audio Events MIDI</title>
    <style>
        /* ===== ROOT DESIGN TOKENS ===== */
        :root {
            --bg-base: #0f0f0f;
            --bg-surface: #1a1a1a;
            --bg-elevated: #242424;
            --bg-hover: #2a2a2a;
            --bg-active: #333;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --accent: #1db954;
            --accent-hover: #1ed760;
            --accent-dim: rgba(29,185,84,0.15);
            --amber: #f59e0b;
            --amber-dark: #b45309;
            --amber-dim: rgba(245,158,11,0.15);
            --danger: #ef4444;
            --border: #2a2a2a;
            --border-light: #222;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-full: 9999px;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --glass-top: rgba(15,15,15,0.88);
            --glass-bottom: rgba(18,18,18,0.94);
            --glass-tab: rgba(15,15,15,0.92);
            --glass-shadow: 0 -2px 16px rgba(0,0,0,0.3);
            --tick-default: rgba(255,255,255,0.3);
            --tick-current: #fff;
            --tick-current-shadow: 0 0 4px rgba(255,255,255,0.6);
            --backdrop-overlay: rgba(0,0,0,0.6);
            --accent-on-btn: #000;
            --mobile-tab-height: 56px;
            --mobile-playerbar-height: 160px;
            --mobile-topbar-height: 0px;
        }

        /* ===== LIGHT THEME ===== */
        [data-theme="light"] {
            --bg-base: #f5f5f5;
            --bg-surface: #ffffff;
            --bg-elevated: #ffffff;
            --bg-hover: #e8e8e8;
            --bg-active: #ddd;
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #999;
            --accent: #1db954;
            --accent-hover: #17a349;
            --accent-dim: rgba(29,185,84,0.12);
            --amber: #d97706;
            --amber-dark: #92400e;
            --amber-dim: rgba(217,119,6,0.12);
            --danger: #dc2626;
            --border: #e0e0e0;
            --border-light: #eee;
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
            --glass-top: rgba(245,245,245,0.92);
            --glass-bottom: rgba(255,255,255,0.96);
            --glass-tab: rgba(245,245,245,0.95);
            --glass-shadow: 0 -1px 8px rgba(0,0,0,0.06);
            --tick-default: rgba(0,0,0,0.25);
            --tick-current: #1a1a1a;
            --tick-current-shadow: 0 0 4px rgba(0,0,0,0.3);
            --backdrop-overlay: rgba(0,0,0,0.3);
            --accent-on-btn: #fff;
        }

        /* ===== RESET & GLOBAL ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        a, button, label, input, select, [role="button"] { -webkit-tap-highlight-color: transparent; }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            overscroll-behavior-y: contain;
        }
        body {
            font-family: -apple-system, 'SF Pro Text', system-ui, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
            max-width: 500px;
            margin: 0 auto;
        }
        audio { width: 100%; display: none; }

        /* ===== LAYOUT ===== */
        .grid {
            display: block;
            height: calc(100vh - var(--mobile-topbar-height, 0px) - var(--mobile-playerbar-height, 160px) - var(--mobile-tab-height, 56px) - env(safe-area-inset-bottom, 0px));
            overflow-y: auto;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }
        .card {
            background: var(--bg-base);
            padding: 0 16px;
            border: none;
            border-radius: 0;
        }
        .card-playlist, .card-events { display: none; }
        #tab-playlist:checked ~ .mobile-tabs-container .card-playlist { display: block; }
        #tab-events:checked   ~ .mobile-tabs-container .card-events   { display: block; }

        .mobile-tabs-container {
            padding-top: var(--mobile-topbar-height);
            padding-bottom: calc(
                var(--mobile-playerbar-height)
                + var(--mobile-tab-height)
                + env(safe-area-inset-bottom, 0px)
            );
        }

        /* ===== SVG ICON HELPER ===== */
        .icon { width: 22px; height: 22px; flex-shrink: 0; pointer-events: none; }
        .icon-sm { width: 18px; height: 18px; }
        .icon-lg { width: 26px; height: 26px; }

        /* ===== BUTTONS ===== */
        button { font-family: inherit; cursor: pointer; }
        .btn-primary {
            background: var(--accent);
            color: var(--accent-on-btn);
            border: none;
            border-radius: var(--radius-full);
            padding: 8px 18px;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.02em;
            -webkit-user-select: none; user-select: none;
        }
        .btn-primary:active { transform: scale(0.96); background: var(--accent-hover); }

        /* ===== TOP BAR (MIDI) ===== */
        .mobile-midi-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: var(--glass-top);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: env(safe-area-inset-top, 0px) 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
        }
        .midi-panel { background: transparent; border: none; padding: 0; margin: 0; width: 100%; }
        .btn-connect {
            background: transparent; border: none; width: 100%; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .midi-status {
            font-size: 0.98rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            border-radius: 0;
            padding: 8px 14px;
            transition: background 200ms, color 200ms, box-shadow 200ms;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }
        .midi-status.cc-flash {
            background: var(--amber-dim) !important;
            color: var(--amber) !important;
            box-shadow: none !important;
        }

        /* ===== DIALOG ===== */
        dialog {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            background: var(--bg-elevated);
            color: var(--text-primary);
            box-shadow: var(--shadow-lg);
            max-width: 340px;
            width: 90vw;
        }
        dialog::backdrop { background: var(--backdrop-overlay); backdrop-filter: blur(4px); }
        dialog h3 { margin: 0 0 .75rem; font-size: 1.05rem; }
        dialog .row { display: flex; align-items: center; gap: 10px; }
        dialog .form-spacing { margin-top: 1rem; }
        dialog label { display: flex; flex-direction: column; font-size: 0.85rem; gap: 4px; color: var(--text-secondary); }
        dialog select {
            width: 100%; padding: 10px; font-size: 1rem;
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-surface); color: var(--text-primary);
        }

        /* ===== PLAYLIST CARD ===== */
        .header-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0 10px;
            -webkit-user-select: none; user-select: none;
        }
        .header-row h3 { margin: 0; font-size: 1.21rem; font-weight: 700; }
        .header-row h4 { margin: 0; font-size: 1.05rem; font-weight: 600; color: var(--text-secondary); }
        #playlist-ui {
            overflow: visible;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            padding: 11px 12px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            font-size: 0.94rem;
            position: relative;
            transition: background 0.12s;
            color: var(--text-primary);
        }
        .playlist-item > span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .playlist-item:last-child { border-bottom: none; }
        .playlist-item:active { background: var(--bg-hover); }
        .playlist-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 600;
        }
        .playlist-item.dragging { opacity: 0.4; cursor: grabbing; }
        .drag-handle {
            display: flex; align-items: center; justify-content: center;
            padding: 4px 6px; margin-right: 4px; cursor: grab;
            color: var(--text-muted);
            touch-action: none;
            flex-shrink: 0;
        }
        .drag-handle:active { color: var(--text-secondary); }
        .drag-handle svg { width: 16px; height: 16px; pointer-events: none; }
        .drop-indicator { height: 2px; background: var(--accent); margin: 1px 0; border-radius: var(--radius-full); }
        .playlist-item, .playlist-item * {
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== 3-DOT MENU (shared: playlist & markers) ===== */
        .menu-btn {
            background: none; border: none; cursor: pointer;
            padding: 6px 8px; color: var(--text-muted);
            border-radius: var(--radius-sm);
            transition: background 0.12s, color 0.12s;
            display: flex; align-items: center; justify-content: center;
        }
        .menu-btn:active { background: var(--bg-hover); color: var(--text-secondary); }
        .dropdown-menu {
            display: none; position: absolute;
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
            z-index: 1000; min-width: 130px; overflow: hidden;
            right: 0; top: 100%;
        }
        .dropdown-menu.open { display: block; }
        .dropdown-menu button {
            display: flex; align-items: center; gap: 8px;
            width: 100%; text-align: left; padding: 11px 14px;
            border: none; background: transparent; cursor: pointer;
            font-size: 0.94rem; color: var(--text-primary);
            transition: background 0.1s;
        }
        .dropdown-menu button:active { background: var(--bg-hover); }
        .dropdown-menu button.danger-item { color: var(--danger); }

        /* ===== EVENTS/MARKERS CARD ===== */
        .markers-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 2px;
            -webkit-user-select: none; user-select: none;
        }
        .markers-header h4 { margin: 0; font-size: 1.05rem; font-weight: 600; color: var(--text-secondary); }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex; gap: 8px; align-items: center;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-light);
            transition: background 0.12s;
            position: relative;
        }
        li:last-child { border-bottom: none; }
        li.active-event {
            background: var(--amber-dim);
        }
        .marker-left { font-variant-numeric: tabular-nums; font-size: 0.94rem; font-weight: 500; color: var(--text-primary); min-width: 0; }
        .marker-middle { text-align: center; min-width: 0; }
        .marker-note {
            min-width: 0;
            font-size: 0.88rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
        }
        .marker-right { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
        .preset-badge {
            font-size: 0.83rem; font-weight: 600;
            color: var(--text-primary);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 2px 10px;
            letter-spacing: 0.03em;
        }
        #event-list li {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            align-items: center;
            gap: 8px;
            user-select: none;
        }
        #event-list .time-input, #event-list .preset-input, #event-list .note-input {
            flex: 1 1 0; min-width: 0; width: 0;
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 8px 10px; font-size: 1rem;
            background: var(--bg-surface); color: var(--text-primary);
            outline: none; transition: border-color 0.15s;
        }
        #event-list .time-input:focus, #event-list .preset-input:focus, #event-list .note-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(29,185,84,0.15);
        }
        #event-list li button { flex: 0 0 auto; white-space: nowrap; }
        #event-list li.editing {
            grid-template-columns: 1fr 1fr 1fr auto;
            row-gap: 6px;
        }
        #event-list li.editing .marker-left,
        #event-list li.editing .marker-middle,
        #event-list li.editing .marker-note { flex: 1 1 0; min-width: 0; }
        #event-list li.editing .marker-right {
            grid-column: 1 / -1;
            justify-content: flex-end;
            padding-top: 2px;
        }
        #event-list li.editing .time-input, #event-list li.editing .preset-input, #event-list li.editing .note-input {
            width: 100%; font-size: 1rem; padding: 8px 10px; min-height: 44px;
            border-radius: var(--radius-sm);
        }
        #event-list li.editing .marker-right button {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 7px 16px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.12s;
        }
        #event-list li.editing .marker-right button:first-child {
            background: var(--accent);
            color: var(--accent-on-btn);
            border-color: var(--accent);
        }
        #event-list li.editing .marker-right button:active { transform: scale(0.96); }

        /* ===== BOTTOM PLAYER BAR ===== */
        .mobile-player-bar {
            position: fixed;
            left: 0; right: 0;
            bottom: calc(var(--mobile-tab-height) + env(safe-area-inset-bottom, 0px));
            background: var(--glass-bottom);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 0;
            display: grid; grid-template-columns: 1fr;
            z-index: 998;
            box-shadow: var(--glass-shadow);
        }
        .mobile-player-bar .speed-wrapper .speed-menu { top: auto; bottom: calc(100% + 6px); }
        .mobile-player-bar .volume-wrapper .volume-popup { top: auto; bottom: calc(100% + 6px); }
        .mobile-player-bar .progress-container,
        .mobile-player-bar .controls-container { margin: 0; }

        /* ===== PROGRESS BAR ===== */
        .progress-container {
            background: transparent; border: none;
            padding: 14px 16px 12px;
            display: flex; align-items: center; gap: 8px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .progress-track {
            position: relative; height: 5px;
            background: var(--bg-active); border-radius: var(--radius-full);
            flex: 1; cursor: pointer;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .progress-track::before {
            content: ''; position: absolute;
            top: -14px; bottom: -14px; left: 0; right: 0;
        }
        .progress-fill {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: var(--accent); border-radius: var(--radius-full); z-index: 1;
        }
        .progress-ghost-fill { position: absolute; top: 0; height: 100%; width: 0%; background: var(--accent); opacity: 0.3; pointer-events: none; display: none; z-index: 1; }
        .progress-ghost { position: absolute; top: 0; width: 2px; height: 100%; background: var(--accent); opacity: 0.8; pointer-events: none; transform: translateX(-1px); display: none; z-index: 4; }
        .progress-ab {
            position: absolute; top: 0; height: 100%; left: 0%; width: 0%;
            background: rgba(245,158,11,0.2); display: none; z-index: 2;
            border-radius: var(--radius-full);
        }
        .progress-ab.enabled { background: rgba(245,158,11,0.45); }
        .ab-handle {
            position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
            background: var(--amber); border: 2px solid var(--amber-dark);
            transform: translate(-50%, -50%); cursor: ew-resize;
            transition: transform 0.1s;
        }
        .ab-handle:active { transform: translate(-50%, -50%) scale(1.25); }
        .ab-handle.right { right: 0; left: auto; transform: translate(50%, -50%); }
        .ab-handle.right:active { transform: translate(50%, -50%) scale(1.25); }
        .ab-drag { position: absolute; left: 0; right: 0; top: -14px; bottom: -14px; cursor: grab; }
        .ab-drag.dragging { cursor: grabbing; }
        .ab-handle, .ab-drag { touch-action: none; -webkit-tap-highlight-color: transparent; }
        .time-label {
            font-size: 0.77rem; color: var(--text-secondary); flex-shrink: 0;
            font-variant-numeric: tabular-nums; font-weight: 500;
            min-width: 40px;
        }
        .time-label.time-left { text-align: left; }
        .time-label.time-right { text-align: right; }
        .progress-tick {
            position: absolute; top: 0; width: 2px; height: 100%;
            background: var(--tick-default); z-index: 3; pointer-events: none;
            transform: translateX(-1px); border-radius: 1px;
        }
        .progress-tick.fired { background: var(--accent); opacity: 0.9; }
        .progress-tick.current { background: var(--tick-current); box-shadow: var(--tick-current-shadow); width: 3px; }

        /* ===== A/B LOOP CONTROLS ===== */
        .aux-controls { justify-content: space-evenly; }
        .ab-btn {
            border-radius: var(--radius-full);
            font-size: 0.86rem; padding: 4px 12px;
            line-height: 1.2; width: auto; height: auto;
            font-weight: 600; font-variant-numeric: tabular-nums;
        }
        .ab-timestamp {
            min-width: 76px; text-align: center; white-space: nowrap;
        }
        .ab-panel {
            max-height: 56px;
            overflow: hidden;
            transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
            opacity: 1;
        }
        .ab-panel.collapsed {
            max-height: 0; opacity: 0;
            padding-top: 0; padding-bottom: 0;
        }

        /* ===== PLAYBACK CONTROLS ===== */
        .controls-container {
            background: transparent; padding: 2px 0px 4px;
            display: flex; align-items: center; justify-content: space-evenly;
            border: none; flex-wrap: nowrap;
        }
        .control-btn {
            background: transparent; color: var(--text-secondary);
            border: none; width: 48px; height: 48px;
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: background 0.12s, transform 0.1s, color 0.12s;
            padding: 0;
        }
        .control-btn:active { transform: scale(0.9); }
        .control-btn.play-btn {
            width: 56px; height: 56px;
            background: var(--accent); color: var(--accent-on-btn);
        }
        .control-btn.play-btn:active { background: var(--accent-hover); transform: scale(0.93); }
        .control-btn.loop-mode {
            /* background: var(--accent-dim); */  color: var(--accent);
        }
        .control-btn.queue-mode {
            /* background: var(--amber-dim); */  color: var(--amber);
        }
        .control-btn.loop-active {
            /* background: var(--amber-dim); */  color: var(--amber);
        }

        /* ===== SPEED MENU ===== */
        .speed-wrapper { position: relative; }
        .info-wrapper { position: relative; flex: 0 0 auto; }
        .info-popup {
            position: absolute; top: calc(100% + 6px); left: 0;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
            padding: 12px 16px; display: none; z-index: 2000;
            min-width: 200px; white-space: nowrap;
        }
        .info-popup .info-heading {
            font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--text-muted);
            margin: 0 0 6px;
        }
        .info-popup .info-heading:not(:first-child) { margin-top: 12px; }
        .info-popup .info-version {
            /* font-size: 0.86rem; font-weight: 600; color: var(--text-primary); margin: 0 0 2px; */
            font-size: 0.86rem; color: var(--text-secondary); margin: 0 0 2px;
        }
        .info-popup .info-device {
            font-size: 0.86rem; color: var(--text-secondary);
            padding: 4px 0;
        }
        .speed-btn-label {
            min-width: 44px; font-size: 0.83rem;
            color: var(--text-muted); font-weight: 600;
            font-variant-numeric: tabular-nums;
            display: inline-flex; align-items: center; justify-content: center;
            -webkit-user-select: none; user-select: none;
        }
        .speed-menu {
            position: absolute; background: var(--bg-elevated);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
            padding: 4px; display: none; z-index: 2000; min-width: 56px;
        }
        .speed-option {
            display: flex; align-items: center; justify-content: center;
            font-size: 0.88rem; color: var(--text-secondary); font-weight: 500;
            padding: 9px 12px; border-radius: var(--radius-sm);
            border: none; background: transparent; width: 100%; cursor: pointer;
            transition: background 0.1s;
        }
        .speed-option:active { background: var(--bg-hover); }
        .speed-option.active { font-weight: 700; color: var(--accent); background: var(--accent-dim); }

        /* ===== VOLUME SLIDER ===== */
        .volume-wrapper { position: relative; }
        .volume-popup {
            position: absolute; background: var(--bg-elevated);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
            padding: 10px 22px; display: none; z-index: 2000;
            left: 50%; transform: translateX(-50%);
        }
        #vol-slider {
            writing-mode: vertical-lr; direction: rtl;
            width: 4px; height: 100px;
            background: transparent; cursor: pointer;
            accent-color: var(--accent);
        }

        /* ===== TAB BAR ===== */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--mobile-tab-height);
            display: flex;
            background: var(--glass-tab);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            z-index: 999;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .tab-bar .tab {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 3px;
            font-weight: 500; color: var(--text-muted);
            cursor: pointer; user-select: none;
            min-height: 44px; touch-action: manipulation;
            font-size: 0.75rem; letter-spacing: 0.02em;
            transition: color 0.15s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-bar .tab .icon { transition: fill 0.15s; }
        #tab-playlist:checked ~ .tab-bar label[for="tab-playlist"],
        #tab-events:checked   ~ .tab-bar label[for="tab-events"] {
            color: var(--accent);
        }
        #tab-playlist:checked ~ .tab-bar label[for="tab-playlist"] .icon,
        #tab-events:checked   ~ .tab-bar label[for="tab-events"] .icon {
            fill: var(--accent);
        }

        /* ===== STICKY HEADERS ===== */
        .card-playlist .header-row,
        .card-events #current-title,
        .card-events .markers-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-base);
        }
        .card-events #current-title {
            z-index: 11;
        }
        .card-events .markers-header {
            top: var(--sticky-title-height, 43px);
        }
        .card-events #current-title {
            margin: 0; display: block;
            padding: 14px 2px 8px;
            font-size: 1.1rem; font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ===== TOUCH-FRIENDLY ===== */
        @media (pointer: coarse), (hover: none) {
            .ab-handle { width: 22px; height: 22px; }
            .progress-track { height: 7px; }
            .progress-track::before { top: -16px; bottom: -16px; }
            .ab-drag { top: -16px; bottom: -16px; }
            .control-btn { width: 52px; height: 52px; }
            .control-btn.play-btn { width: 60px; height: 60px; }
            #vol-slider { height: 80px; }
            #vol-slider::-webkit-slider-thumb { height: 18px; width: 18px; }
            #vol-slider::-moz-range-thumb { height: 18px; width: 18px; border: none; }
        }

        /* ===== LANDSCAPE BLOCKER ===== */
        #landscape-blocker {
            display: none;
            position: fixed; inset: 0; z-index: 99999;
            background: var(--bg-base);
            color: var(--text-secondary);
            flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; font-size: 1rem; text-align: center;
            padding: 20px;
        }
        @media (orientation: landscape) and (max-height: 600px) {
            #landscape-blocker { display: flex; }
        }

        /* ===== TAB VIEW TRANSITIONS ===== */
        .grid {
            view-transition-name: tab-content;
        }
        @keyframes slide-to-left   { to   { transform: translateX(-100%); opacity: 0; } }
        @keyframes slide-from-right { from { transform: translateX(100%);  opacity: 0; } }
        @keyframes slide-to-right   { to   { transform: translateX(100%);  opacity: 0; } }
        @keyframes slide-from-left  { from { transform: translateX(-100%); opacity: 0; } }

        .slide-forward::view-transition-old(tab-content)  { animation: 200ms ease-in  both slide-to-left;   }
        .slide-forward::view-transition-new(tab-content)  { animation: 200ms ease-out both slide-from-right; }
        .slide-backward::view-transition-old(tab-content) { animation: 200ms ease-in  both slide-to-right;  }
        .slide-backward::view-transition-new(tab-content) { animation: 200ms ease-out both slide-from-left;  }
    </style>
</head>

<script>
/* ============================ Theme toggle ================================ */
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelector('meta[name="theme-color"]').content = theme === 'light' ? '#f5f5f5' : '#0f0f0f';
    const icon = document.getElementById('themeIcon');
    if (icon) {
        icon.innerHTML = theme === 'light'
            ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
            : '<path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>';
        icon.setAttribute('fill', theme === 'light' ? 'none' : 'currentColor');
        icon.setAttribute('stroke', theme === 'light' ? 'currentColor' : 'none');
        icon.setAttribute('stroke-width', theme === 'light' ? '2' : '0');
    }
}
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ui-theme', next);
    applyTheme(next);
}
applyTheme(localStorage.getItem('ui-theme') || 'dark');

/* -------------------------------- INFO POPUP ----------------------------- */
function toggleInfoPopup() {
    const popup = document.getElementById('infoPopup');
    popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
}
document.addEventListener('pointerdown', (e) => {
    if (!e.target.closest('.info-wrapper')) {
        const popup = document.getElementById('infoPopup');
        if (popup) popup.style.display = 'none';
    }
});

/* ============================ Robust IndexedDB ============================ */
const IDB = window.indexedDB || window.webkitIndexedDB || window.mozIndexedDB || window.msIndexedDB;
let db = null;
const DB_NAME = "AudioMasterDB_2026";
const DB_VERSION = 1;
const STORE_SONGS = "songs";

function openDB() {
    return new Promise((resolve) => {
        if (!IDB) { console.warn("IndexedDB not available."); return resolve(null); }
        const req = IDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const _db = e.target.result;
            if (!_db.objectStoreNames.contains(STORE_SONGS)) {
                _db.createObjectStore(STORE_SONGS, { keyPath: "name" });
            }
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror  = () => resolve(null);
    });
}
function getAllSongs() {
    return new Promise((resolve) => {
        if (!db) return resolve([]);
        const tx = db.transaction(STORE_SONGS, "readonly");
        const store = tx.objectStore(STORE_SONGS);
        const items = [];
        if ("getAll" in store) {
            const req = store.getAll();
            req.onsuccess = () => resolve(req.result || []);
            req.onerror   = () => resolve([]);
        } else {
            const req = store.openCursor();
            req.onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) { items.push(cursor.value); cursor.continue(); }
                else resolve(items);
            };
            req.onerror = () => resolve([]);
        }
    });
}
function putSongs(files) {
    return new Promise((resolve) => {
        if (!db) return resolve(false);
        const tx = db.transaction(STORE_SONGS, "readwrite");
        const store = tx.objectStore(STORE_SONGS);
        try {
            files.forEach((file) => {
                store.put({ name: file.name, type: file.type || "", lastModified: file.lastModified || Date.now(), data: file });
            });
        } catch (err) { console.error("IDB put error", err); }
        tx.oncomplete = () => resolve(true);
        tx.onerror    = () => resolve(false);
        tx.onabort    = () => resolve(false);
    });
}
function getSongByName(name) {
    return new Promise((resolve) => {
        if (!db) return resolve(null);
        const tx = db.transaction(STORE_SONGS, "readonly");
        const store = tx.objectStore(STORE_SONGS);
        const req = store.get(name);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror   = () => resolve(null);
    });
}
function removeSongFromDB(name) {
    return new Promise((resolve) => {
        if (!db) return resolve(false);
        const tx = db.transaction(STORE_SONGS, "readwrite");
        tx.objectStore(STORE_SONGS).delete(name);
        tx.oncomplete = () => {
            removeFromOrder(name);
            resolve(true);
        };
        tx.onerror    = () => resolve(false);
        tx.onabort    = () => resolve(false);
    });
}
async function renameSongInDB(oldName) {
    const newName = prompt(`Rename "${oldName}" to:`, oldName);
    if (!newName || newName.trim() === '' || newName === oldName) return;
    
    const song = await getSongByName(oldName);
    if (!song) return;
    
    if (db) {
        const tx = db.transaction(STORE_SONGS, "readwrite");
        const store = tx.objectStore(STORE_SONGS);
        store.delete(oldName);
        store.put({ ...song, name: newName });
        
        tx.oncomplete = async () => {
                    if (currentFileName === oldName) {
                currentFileName = newName;
                document.getElementById('current-title').textContent = newName;
                const volMap = JSON.parse(localStorage.getItem(VOLUME_MAP_KEY) || '{}');
                if (volMap[oldName] !== undefined) { volMap[newName] = volMap[oldName]; delete volMap[oldName]; localStorage.setItem(VOLUME_MAP_KEY, JSON.stringify(volMap)); }
                const speedMap = JSON.parse(localStorage.getItem(SPEED_MAP_KEY) || '{}');
                if (speedMap[oldName] !== undefined) { speedMap[newName] = speedMap[oldName]; delete speedMap[oldName]; localStorage.setItem(SPEED_MAP_KEY, JSON.stringify(speedMap)); }
                const eventMap = JSON.parse(localStorage.getItem(EVENT_MAP_KEY) || '{}');
                if (eventMap[oldName] !== undefined) { eventMap[newName] = eventMap[oldName]; delete eventMap[oldName]; localStorage.setItem(EVENT_MAP_KEY, JSON.stringify(eventMap)); }
                const abMap = JSON.parse(localStorage.getItem(AB_LOOP_MAP_KEY) || '{}');
                if (abMap[oldName] !== undefined) { abMap[newName] = abMap[oldName]; delete abMap[oldName]; localStorage.setItem(AB_LOOP_MAP_KEY, JSON.stringify(abMap)); }
            }
            renameInOrder(oldName, newName);
            await renderPlaylist();
        };
    }
}
function togglePlaylistMenu(e, songName, menuId) {
    const menu = document.getElementById(menuId);
    const allMenus = document.querySelectorAll('#playlist-ui .dropdown-menu');
    allMenus.forEach(m => {
        if (m.id !== menuId) m.classList.remove('open');
    });
    menu.classList.toggle('open');
    if (menu.classList.contains('open')) flipMenuIfOverflow(menu);
}

/* ---------- drag-to-reorder logic (drag handle approach) ---------- */
let dragSrcEl = null;
let dragSrcIdx = null;
let dropIndicator = null;
let isDraggingItem = false;
let recentlyDragged = false;
const DRAG_ACTIVATE_PX = 6;  // min movement before drag "activates" visually

function onPlaylistPointerDown(e) {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;                   // only start drag from the handle
    const row = handle.closest('.playlist-item');
    if (!row) return;
    const idx = parseInt(row.dataset.idx, 10);
    if (isNaN(idx)) return;

    e.preventDefault();                    // prevent text selection & scroll (safe because touch-action:none on handle)
    handle.setPointerCapture(e.pointerId); // track pointer even outside element

    dragSrcEl = row;
    dragSrcIdx = idx;
    isDraggingItem = false;                // not yet visually dragging (need DRAG_ACTIVATE_PX movement)
    const startY = e.clientY;

    dropIndicator = document.createElement('div');
    dropIndicator.className = 'drop-indicator';
    dropIndicator.dataset.targetIdx = idx;

    function onMove(ev) {
        const dy = Math.abs(ev.clientY - startY);
        if (!isDraggingItem) {
            if (dy < DRAG_ACTIVATE_PX) return;  // dead-zone: small moves ignored
            isDraggingItem = true;
            dragSrcEl.classList.add('dragging');
            if (navigator.vibrate) navigator.vibrate(30);
        }
        updateDragPosition(ev.clientY);
    }

    function onUp(ev) {
        handle.releasePointerCapture(ev.pointerId);
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onUp);
        handle.removeEventListener('pointercancel', onUp);
        finishDrag();
    }

    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp);
    handle.addEventListener('pointercancel', onUp);
}

/* --- Active drag phase: reorder --- */
function updateDragPosition(clientY) {
    if (!dragSrcEl || !isDraggingItem) return;
    const allRows = Array.from(playlistUI.querySelectorAll('.playlist-item'));
    const items = allRows.filter(r => !r.classList.contains('dragging'));
    let targetIdx = allRows.length;
    for (let i = 0; i < items.length; i++) {
        const rect = items[i].getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
            targetIdx = parseInt(items[i].dataset.idx, 10);
            break;
        }
    }
    if (dropIndicator.parentNode) dropIndicator.parentNode.removeChild(dropIndicator);
    if (targetIdx < allRows.length) {
        const refEl = allRows.find(it => parseInt(it.dataset.idx, 10) === targetIdx && !it.classList.contains('dragging'));
        if (refEl) playlistUI.insertBefore(dropIndicator, refEl);
        else playlistUI.appendChild(dropIndicator);
    } else {
        playlistUI.appendChild(dropIndicator);
    }
    dropIndicator.dataset.targetIdx = targetIdx;
}

function finishDrag() {
    if (dragSrcEl) dragSrcEl.classList.remove('dragging');
    if (dropIndicator) {
        const targetIdx = parseInt(dropIndicator.dataset.targetIdx, 10);
        dropIndicator.remove();
        if (isDraggingItem && typeof dragSrcIdx === 'number') {
            let finalIdx = targetIdx;
            if (targetIdx > dragSrcIdx) finalIdx = targetIdx - 1;
            if (finalIdx !== dragSrcIdx) {
                moveInOrder(dragSrcIdx, finalIdx);
                renderPlaylist();
                recentlyDragged = true;
                setTimeout(() => { recentlyDragged = false; }, 150);
            }
        }
    }
    dragSrcEl = null;
    dragSrcIdx = null;
    dropIndicator = null;
    isDraggingItem = false;
}

function getPlaylistOrder() {
    try {
        return JSON.parse(localStorage.getItem(ORDER_KEY) || '[]');
    } catch { return []; }
}
function savePlaylistOrder(order) {
    localStorage.setItem(ORDER_KEY, JSON.stringify(order));
}
function reconcileOrderWithSongs(songs) {
    try {
        if (!Array.isArray(songs) || !songs.length) return [];
        // keep only existing names, then append any new ones
        let order = getPlaylistOrder();
        if (!Array.isArray(order)) order = [];
        order = order.filter(n => songs.some(s => s.name === n));
        songs.forEach(s => { if (s.name && !order.includes(s.name)) order.push(s.name); });
        savePlaylistOrder(order);
        return order;
    } catch (err) {
        console.error("reconcileOrderWithSongs error:", err);
        return songs.map(s => s.name);
    }
}
function moveInOrder(from, to) {
    try {
        const order = getPlaylistOrder();
        if (!Array.isArray(order) || from < 0 || to < 0 || from >= order.length) return;
        if (from === to) return; // no-op
        const item = order.splice(from, 1)[0];
        if (!item) return; // safety check
        order.splice(to, 0, item);
        savePlaylistOrder(order);
    } catch (err) {
        console.error("moveInOrder error:", err);
    }
}
function removeFromOrder(name) {
    const order = getPlaylistOrder().filter(n => n !== name);
    savePlaylistOrder(order);
}
function renameInOrder(oldName, newName) {
    const order = getPlaylistOrder();
    const idx = order.indexOf(oldName);
    if (idx !== -1) {
        order[idx] = newName;
        savePlaylistOrder(order);
    }
}

function formatClock(t, digits = DEFAULT_DECIMALS) {
    if (!isFinite(t) || t < 0) t = 0;
    const factor = Math.pow(10, digits);
    const units = Math.round(t * factor);
    const perMinute = 60 * factor;

    const m = Math.floor(units / perMinute);
    const sUnits = units % perMinute;
    const s = Math.floor(sUnits / factor);
    const frac = sUnits % factor;

    const secStr = String(s).padStart(2, '0');
    const fracStr = digits > 0 ? '.' + String(frac).padStart(digits, '0') : '';
    return `${m}:${secStr}${fracStr}`;
}

// --- BLE-MIDI Packet Helpers ---
function buildBleMidiPacket(midiBytes, useZeroTimestamp = false) {
    let tsHigh = 0x80, tsLow = 0x80;
    if (!useZeroTimestamp) {
        const ts = Math.floor(performance.now()) % 8192;
        tsHigh = 0x80 | (ts >> 7);
        tsLow  = 0x80 | (ts & 0x7F);
    }
    const packet = new Uint8Array(2 + midiBytes.length);
    packet[0] = tsHigh;
    packet[1] = tsLow;
    packet.set(midiBytes, 2);
    return packet;
}
async function writeBle(bytes, { forceResponse = false, useZeroTimestamp = false } = {}) {
    if (!midiChar) throw new Error('Not connected');
    const packet = buildBleMidiPacket(bytes, useZeroTimestamp);
    if (!forceResponse && typeof midiChar.writeValueWithoutResponse === 'function') {
        await midiChar.writeValueWithoutResponse(packet);
    } else {
        await midiChar.writeValue(packet);
    }
}
let bleQueue = Promise.resolve();
function enqueueBle(bytes, opts = {}) {
    bleQueue = bleQueue.then(() => writeBle(bytes, opts)).catch(() => { /* swallow transient errors */ });
    return bleQueue;
}

// --- Spark BLE Helpers ---
function buildSparkPresetCmd(index) {
    const hex = `01fe000053fe1a000000000000000000f0013a15013800000${index}f7`;
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
    return bytes;
}
let sparkQueue = Promise.resolve();
function sendSparkPreset(presetNumber) {
    if (!sparkWriteChar) return;
    const index = Math.max(0, Math.min(3, presetNumber - 1));
    const cmd = buildSparkPresetCmd(index);
    sparkQueue = sparkQueue.then(() => sparkWriteChar.writeValue(cmd)).then(() => flashCcStatus()).catch(() => {});
}

    'f0 7E 7F 06 01 f7',
    'f0 00 01 0c 24 01 4d 00 00 00 00 07 00 01 00 00 00 00 00 00 00 00 00 00 00 00 00 00 f7',
    'f0 00 01 0c 24 01 4d 00 01 00 00 07 00 04 00 00 00 04 00 00 00 00 00 00 00 00 00 00 f7',

function parseSysExHex(hexStr) {
    const clean = hexStr.replace(/\s+/g, '');
    const bytes = new Uint8Array(clean.length / 2);
    for (let i = 0; i < clean.length; i += 2) bytes[i / 2] = parseInt(clean.substr(i, 2), 16);
    return bytes;
}

async function sendCc(channel, ccNumber, ccValue) {
    const ch  = Math.min(16, Math.max(1, Number(channel)  || 1));
    const cc  = Math.min(127, Math.max(0, Number(ccNumber) || 0));
    const val = Math.min(127, Math.max(0, Number(ccValue)  || 0));
    const status = 0xB0 + (ch - 1);
    const midiBytes = new Uint8Array([status, cc, val]);

    try {
        if (currentTransport === 'usb') {
            writeUsb(midiBytes);
            flashCcStatus();
        } else if (currentTransport === 'ble') {
            enqueueBle(midiBytes, { forceResponse: false, useZeroTimestamp: false })
                .then(() => { flashCcStatus(); });
        }
    } catch { /* swallow transient errors */ }
}
window.sendCc = sendCc;

async function sendPc(channel, program) {
    const ch  = Math.min(16, Math.max(1, Number(channel)  || 1));
    const pg  = Math.min(127, Math.max(0, Number(program) || 0));
    const status = 0xC0 + (ch - 1);
    const midiBytes = new Uint8Array([status, pg]);

    try {
        if (currentTransport === 'usb') {
            writeUsb(midiBytes);
            flashCcStatus();
        } else if (currentTransport === 'ble') {
            enqueueBle(midiBytes, { forceResponse: false, useZeroTimestamp: true })
                .then(() => { flashCcStatus(); });
        }
    } catch { /* swallow transient errors */ }
}

let toDisconnect = 'x';
let toConnect = 'C';
let connectionStatus = toConnect;

async function connectOrDisconnect() {
    if (connectionStatus === toDisconnect) {
        if (currentTransport === 'ble') {
            try { if (device && device.gatt.connected) device.gatt.disconnect(); } catch {}
            device = server = service = midiChar = sparkWriteChar = null;
        } else if (currentTransport === 'usb') {
            usbOutput = null;
        }
        currentTransport = null;
        deviceType = null;
        connectionStatus = toConnect;
        setStatusText('Connect');
        return;
    }

    const access = await ensureMidiAccess();
    if (access) {
        const outputs = listUsbOutputs();

        if (outputs.length === 1) {
            const candidate = outputs[0];
            const ok = confirm(`Connect to USB MIDI output:\n\n${candidate.name || 'USB Output'}\n\nOK to connect, Cancel to choose BLE.`);
            if (ok) {
                usbOutput = candidate;
                currentTransport = 'usb';
                deviceType = 'midi';
                connectionStatus = toDisconnect;
                setStatusText(usbOutput.name || 'USB Output');
                finishUsbConnect();
                return;
            }
        } else if (outputs.length > 1) {
            usbOutputEl.innerHTML = '';
            outputs.forEach(out => {
                const opt = document.createElement('option');
                opt.value = out.id;
                opt.textContent = out.name || `Output ${out.id}`;
                usbOutputEl.appendChild(opt);
            });
            usbDialog.showModal();

            const onConnect = () => {
                const id = usbOutputEl.value;
                usbOutput = access.outputs.get(id);
                usbDialog.close();
                usbConnectBtn.removeEventListener('click', onConnect);
                usbCancelBtn.removeEventListener('click', onCancel);
                if (usbOutput) {
                    currentTransport = 'usb';
                    deviceType = 'midi';
                    connectionStatus = toDisconnect;
                    setStatusText(usbOutput.name || 'USB Output');
                    finishUsbConnect();
                } else {
                    connectBleFlow();
                }
            };
            const onCancel = () => {
                usbDialog.close();
                usbConnectBtn.removeEventListener('click', onConnect);
                usbCancelBtn.removeEventListener('click', onCancel);
                connectBleFlow();
            };
            usbConnectBtn.addEventListener('click', onConnect, { once: true });
            usbCancelBtn.addEventListener('click', onCancel,  { once: true });
            return;
        }
    }
    connectBleFlow();
}
async function connectBleFlow() {
    if (!navigator.bluetooth) { setStatusText('Web Bluetooth unavailable'); return; }
    try {
        setStatusText('Requesting BLE device...');
        device = await navigator.bluetooth.requestDevice({
            filters: [
                { services: [MIDI_SERVICE_UUID] },
                { namePrefix: 'Spark' }
            ],
            optionalServices: [MIDI_SERVICE_UUID, SPARK_SERVICE_UUID]
        });

        device.addEventListener('gattserverdisconnected', () => {
            connectionStatus = toConnect;
            setStatusText('Connect');
            device = server = service = midiChar = sparkWriteChar = null;
            deviceType = null;
            currentTransport = null;
        });

        setStatusText('Connecting…');
        server = await device.gatt.connect();

        const devName = (device.name || '').toLowerCase();
        if (devName.includes('thr')) {
            device.gatt.disconnect();
            device = server = service = midiChar = sparkWriteChar = null;
            currentTransport = null;
            deviceType = null;
            connectionStatus = toConnect;
            setStatusText('Connect');
            alert('THRII connected via Bluetooth is not supported.\nPlease connect via USB.');
            return;
        }

        const isSpark = devName.startsWith('spark');
        if (isSpark) {
            const sparkService = await server.getPrimaryService(SPARK_SERVICE_UUID);
            sparkWriteChar = await sparkService.getCharacteristic(SPARK_WRITE_UUID);
            const sparkNotifyChar = await sparkService.getCharacteristic(SPARK_NOTIFY_UUID);
            await sparkNotifyChar.startNotifications();
            sparkNotifyChar.addEventListener('characteristicvaluechanged', () => { /* no-op */ });
            deviceType = 'spark';
        } else {
            service = await server.getPrimaryService(MIDI_SERVICE_UUID);
            midiChar = await service.getCharacteristic(MIDI_CHARACTERISTIC_UUID);
            try {
                await midiChar.startNotifications();
                midiChar.addEventListener('characteristicvaluechanged', () => { /* no-op */ });
            } catch { /* continue */ }
            deviceType = 'midi';
        }

        currentTransport = 'ble';
        connectionStatus = toDisconnect;
        setStatusText(device.name || 'BLE Device');
    } catch {
        setStatusText('Error');
    }
}

function seekRelative(seconds) {
    const prev = audio.currentTime;
    const dur = audio.duration || prev;
    const target = Math.min(Math.max(0, prev + seconds), dur);
    if (seconds < 0 && target < prev) { reconcileMarkersOnBackwardJump(target, prev); }

async function getNextSongInPlaylist() {
    if (!currentFileName) return null;
    const order = getPlaylistOrder();
    if (!order.length) return null;
    
    const currentIndex = order.indexOf(currentFileName);
    if (currentIndex === -1) return null; // current song not in playlist
    
    const nextIndex = (currentIndex + 1) % order.length; // wrap to start if at end
    return order[nextIndex];
}

async function prevTrack() {
    if (!currentFileName) return;
    // If more than 3 seconds in, restart current song; otherwise go to previous
    if (audio.currentTime > 3) {
        seekToTime(0);
        return;
    }
    const order = getPlaylistOrder();
    if (!order.length) return;
    const idx = order.indexOf(currentFileName);
    if (idx === -1) return;
    const prevIdx = (idx - 1 + order.length) % order.length;
    await playSong(order[prevIdx]);
}

async function nextTrack() {
    const next = await getNextSongInPlaylist();
    if (next) await playSong(next);
}

        const nextSong = await getNextSongInPlaylist();
        if (nextSong && nextSong !== currentFileName) {
            console.log('Queue: Playing next song:', nextSong);
            await playSong(nextSong);
        } else if (nextSong === currentFileName) {

function renderTimeLabel(currentTime) {
    const dur = audio.duration || 0;
    timeCurrent.textContent = formatClock(currentTime);

}
function updateProgressUI() {
    const dur = audio.duration || 0;
    const pct = dur ? (audio.currentTime / dur) * 100 : 0;
    progressFill.style.width = `${pct}%`;
    renderTimeLabel(audio.currentTime);
    updateABOverlay();
}
function updateABOverlay() {
    const dur = audio.duration;
    const show = abLoop.visible && isABValid() && dur && isFinite(dur);
    progressAB.style.display = show ? 'block' : 'none';
    if (!show) return;
    const aPct = (abLoop.a / dur) * 100;
    const bPct = (abLoop.b / dur) * 100;

    progressAB.style.width = `${Math.max(0, bPct - aPct)}%`;

function xToTime(clientX) {
    const rect = progressBar.getBoundingClientRect();
    const ratio = (clientX - rect.left) / rect.width;
    const dur = audio.duration || 0;
    return Math.min(Math.max(0, ratio * dur), dur);
}
function showGhostPreview(targetTime) {
    const dur = audio.duration || 0;
    if (!dur || !isFinite(dur)) return;
    const targetPct = (targetTime / dur) * 100;
    const currentPct = scrubStartTime != null ? (scrubStartTime / dur) * 100 : parseFloat(progressFill.style.width) || 0;
    if (targetPct >= currentPct) {

        progressFill.style.width = `${currentPct}%`;
        progressGhostFill.style.left = '0%';
        progressGhostFill.style.width = `${targetPct}%`;
    } else {
        // Dragging backward: shrink the solid fill to target, ghost covers the gap
        progressFill.style.width = `${targetPct}%`;
        progressGhostFill.style.left = `${targetPct}%`;
        progressGhostFill.style.width = `${currentPct - targetPct}%`;

    progressGhostFill.style.display = 'block';
    progressGhost.style.left = `${targetPct}%`;
    progressGhost.style.display = 'block';

function fireMarkerByIndex(i, evt, opts) {
    const forceSend = (opts && opts.forceCc) ? true : false;
    const firedBefore = firedEvents.has(evt.time);

    firedEvents.add(evt.time);
    lastTriggeredMarkerTime = evt.time;
    lastTriggeredMarkerIndex = i;

    setActiveMarkerUIByIndex(i);
    updateTickFiredClassByIndex(i, true);

    if (currentTransport && (forceSend || !firedBefore)) {
        try {
            if (deviceType === 'spark') {
                sendSparkPreset(evt.preset);
            } else if (deviceType === 'thrii') {
                sendThriiPreset(evt.preset);
            } else {
                const name = getConnectedDeviceName();
                if ((name || '').toLowerCase().includes('pocket master')) window.sendCc(1, 1, evt.preset);
                else window.sendPc(1, presetToProgram(evt.preset));
            }
        } catch {}
    }
}

/* =========================== Pointer handlers ============================ */
function onPointerDown(e) {
    if (!audio.src) return;
    pointerId = e.pointerId;
    progressBar.setPointerCapture(pointerId);
    wasPlaying = !audio.paused;
    if (wasPlaying) audio.pause();

    const role = e.target.dataset.role || null;
    const dur = audio.duration || 0;
    const rect = progressBar.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;

    if (role === 'handle-a') {
        dragMode = 'handle-a';
    } else if (role === 'handle-b') {
        dragMode = 'handle-b';
    } else if (role === 'segment') {
        dragMode = 'segment';
        const aPct = (abLoop.a / dur);
        const bPct = (abLoop.b / dur);
        segmentLeftPct = aPct;
        segmentWidthPct = Math.max(0, bPct - aPct);
        pointerOffsetPct = clamp(ratio - segmentLeftPct, 0, segmentWidthPct);
        abDrag.classList.add('dragging');
    } else {
        dragMode = 'scrub';
        isScrubbing = true;
        scrubStartTime = audio.currentTime;
        scrubTargetTime = xToTime(e.clientX);
        showGhostPreview(scrubTargetTime);
        renderTimeLabel(scrubTargetTime);
    }
    e.preventDefault();
}
function onPointerMove(e) {
    if (!dragMode) return;
    const dur = audio.duration || 0;
    if (dur <= 0) return;

    if (dragMode === 'scrub') {
        scrubTargetTime = xToTime(e.clientX);
        showGhostPreview(scrubTargetTime);
        renderTimeLabel(scrubTargetTime);
        return;
    }
    const rect = progressBar.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    const time = clamp(ratio * dur, 0, dur);

    if (dragMode === 'handle-a') {
        const maxA = (abLoop.b !== null) ? (abLoop.b - MIN_GAP_SEC) : dur - MIN_GAP_SEC;
        abLoop.a = clamp(time, 0, Math.max(0, maxA));
        updateABOverlay(); updateABUI();
    } else if (dragMode === 'handle-b') {
        const minB = (abLoop.a !== null) ? (abLoop.a + MIN_GAP_SEC) : MIN_GAP_SEC;
        abLoop.b = clamp(time, minB, dur);
        updateABOverlay(); updateABUI();
    } else if (dragMode === 'segment') {
        const newLeftPct = clamp(ratio - pointerOffsetPct, 0, 1 - segmentWidthPct);
        abLoop.a = newLeftPct * dur;
        abLoop.b = (newLeftPct + segmentWidthPct) * dur;
        updateABOverlay(); updateABUI();
    }
}
function onPointerUp(e) {
    if (pointerId !== null) { try { progressBar.releasePointerCapture(pointerId); } catch {} }
    pointerId = null;

    if (dragMode === 'scrub') {
        const start = scrubStartTime ?? audio.currentTime;
        const target = clamp(scrubTargetTime ?? audio.currentTime, 0, audio.duration || audio.currentTime);
        hideGhostPreview();

        if (target < start) { reconcileMarkersOnBackwardJump(target, start); }
        else if (target > start) { reconcileMarkersOnForwardJump(start, target); }

        audio.currentTime = target;
        isScrubbing = false; scrubStartTime = null; scrubTargetTime = null;

        if (wasPlaying) {
            audio.play().catch(() => { updatePlayPauseUI(); });
        }
        updatePlayPauseUI(); updateProgressUI();
    } else if (dragMode) {
        saveABLoop();
        abDrag.classList.remove('dragging');
    }
    dragMode = null;
}
function onPointerCancel(e) {
    hideGhostPreview();
    updateProgressUI();
    if (wasPlaying && audio.paused) {
        audio.play().catch(() => { updatePlayPauseUI(); });
        updatePlayPauseUI();
    }
    dragMode = null; isScrubbing = false; scrubStartTime = null; scrubTargetTime = null; pointerId = null;
}
progressBar.addEventListener('pointerdown', onPointerDown);
window.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup', onPointerUp);
window.addEventListener('pointercancel', onPointerCancel);

function escapeHtml(text) {
    const s = String(text ?? '');
    return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function sanitizeMarkerText(text) {
    return String(text ?? '').trim().slice(0, 24);
}

function normalizeMarkerEntry(entry) {
    if (typeof entry === 'number') {
        return { time: entry, preset: 1, text: '' };
    }
    if (!entry || typeof entry !== 'object') {
        return null;
    }

    const time = Number(entry.time);
    if (!Number.isFinite(time)) {
        return null;
    }

    let preset = parseInt(entry.preset, 10);
    if (isNaN(preset)) preset = 1;
    preset = Math.min(100, Math.max(1, preset));

    return {
        time,
        preset,
        text: sanitizeMarkerText(entry.text)
    };
}

function normalizeMarkerList(rawList) {
    if (!Array.isArray(rawList)) return [];
    return rawList
        .map(normalizeMarkerEntry)
        .filter(Boolean)
        .sort((a, b) => a.time - b.time);
}

function getEvents() {
    const map = JSON.parse(localStorage.getItem(EVENT_MAP_KEY) || '{}');
    const raw = map[currentFileName] || [];
    const normalized = normalizeMarkerList(raw);

    const changed = raw.length !== normalized.length || raw.some((evt, idx) => {
        const norm = normalized[idx];
        if (!norm) return true;
        if (typeof evt === 'number') return true;
        if (!evt || typeof evt !== 'object') return true;
        return Number(evt.time) !== norm.time
            || parseInt(evt.preset, 10) !== norm.preset
            || sanitizeMarkerText(evt.text) !== norm.text;
    });

    if (changed) {
        map[currentFileName] = normalized;
        localStorage.setItem(EVENT_MAP_KEY, JSON.stringify(map));
    }

    return normalized;
}

function nearestMarkerAtOrBefore(time, epsilon = EPS_RECONCILE) {
    const events = getEvents();
    if (!events.length) return null;
    const candidates = events.map((evt, i) => ({ ...evt, i })).filter(e => e.time <= time + epsilon);
    if (!candidates.length) return null;
    return candidates.reduce((best, e) =>
        Math.abs(e.time - time) < Math.abs(best.time - time) ? e : best
    );
}

/* =================== Reconciliation (scrub/rewind/forward) ================== */
function reconcileMarkersOnBackwardJump(targetTime, prevTime) {
    const events = getEvents();
    if (!events.length) return;

    events.forEach((evt, i) => {
        const t = evt.time;
        if (t > targetTime && t <= prevTime) {
            firedEvents.delete(t);
            updateTickFiredClassByIndex(i, false);
        }
    });

    const nearest = nearestMarkerAtOrBefore(targetTime, EPS_RECONCILE);
    if (nearest) {
        fireMarkerByIndex(nearest.i, nearest, { forceCc: true });
    } else {
        lastTriggeredMarkerTime = null;
        lastTriggeredMarkerIndex = null;
        progressBar.querySelectorAll('.progress-tick').forEach(el => el.classList.remove('current'));
        document.querySelectorAll('#event-list li').forEach(el => el.classList.remove('active-event'));
    }
}
function reconcileMarkersOnForwardJump(prevTime, targetTime) {
    const events = getEvents();
    if (!events.length) return;

    events.forEach((evt, i) => {
        const t = evt.time;
        if (t >= prevTime && t <= targetTime) {
            firedEvents.add(t);
            updateTickFiredClassByIndex(i, true);
        }
    });

    const nearest = nearestMarkerAtOrBefore(targetTime, EPS_RECONCILE);
    if (nearest) {
        fireMarkerByIndex(nearest.i, nearest, { forceCc: true });
    } else {
        lastTriggeredMarkerTime = null;
        lastTriggeredMarkerIndex = null;
        progressBar.querySelectorAll('.progress-tick').forEach(el => el.classList.remove('current'));
        document.querySelectorAll('#event-list li').forEach(el => el.classList.remove('active-event'));
    }
}
function reconcileMarkersOnLoopRewind(loopStartA, loopEndB) {
    reconcileMarkersOnBackwardJump(loopStartA, loopEndB);
}

    getEvents().forEach((evt, i) => {
        const t = evt.time;
        if (!firedEvents.has(t) && fireNow >= t) {
            fireMarkerByIndex(i, evt, { forceCc: false });
        }
        if (now < t - 0.5) { firedEvents.delete(t); updateTickFiredClassByIndex(i, false); }
        if (audio.loop && !audio.paused && now === 0.0 && t === 0.0) { firedEvents.delete(t); updateTickFiredClassByIndex(i, false); }
    });

    updateProgressUI();

    if (abLoop.enabled && abLoop.visible && isABValid()) {
        if (now >= (abLoop.b - EPS_LOOP_B)) {
            reconcileMarkersOnLoopRewind(abLoop.a, abLoop.b);
            audio.currentTime = abLoop.a;
            if (audio.paused) {
                audio.play().catch(() => { updatePlayPauseUI(); });
            }
            updatePlayPauseUI();
        }
    }
});

/* =================== Tab switching with view transitions ================= */
const TAB_IDS = ['tab-playlist', 'tab-events'];
let currentTabIndex = 0;
const tabScrollTop = { 0: 0, 1: 0 };

function saveCurrentTabScroll() {
    const grid = document.querySelector('.grid');
    if (!grid) return;
    tabScrollTop[currentTabIndex] = grid.scrollTop;
}

function restoreTabScroll(tabIndex) {
    const grid = document.querySelector('.grid');
    if (!grid) return;
    grid.scrollTop = tabScrollTop[tabIndex] || 0;
}

function getMarkerFocusIndex() {
    const events = getEvents();
    if (!events.length) return null;

    if (Number.isInteger(lastTriggeredMarkerIndex)
        && lastTriggeredMarkerIndex >= 0
        && lastTriggeredMarkerIndex < events.length) {
        return lastTriggeredMarkerIndex;
    }

    const nearest = nearestMarkerAtOrBefore(audio.currentTime, EPS_RECONCILE);
    if (nearest) return nearest.i;

    return 0;
}

function ensureTabFocusVisible(tabIndex) {
    if (tabIndex === 0) {
        const activeItem = playlistUI.querySelector('.playlist-item.active');
        if (activeItem) scrollIntoGridView(activeItem);
        return;
    }

    const focusIdx = getMarkerFocusIndex();
    if (focusIdx === null) return;
    setActiveMarkerUIByIndex(focusIdx, true);
}

function switchTab(newIndex) {
    if (newIndex === currentTabIndex) {
        requestAnimationFrame(() => ensureTabFocusVisible(newIndex));
        return;
    }

    saveCurrentTabScroll();

    const radio = document.getElementById(TAB_IDS[newIndex]);
    if (!radio) return;

    if (!document.startViewTransition) {
        radio.checked = true;
        currentTabIndex = newIndex;
        measureStickyTitle();
        restoreTabScroll(newIndex);
        requestAnimationFrame(() => ensureTabFocusVisible(newIndex));
        return;
    }

    const directionClass = newIndex > currentTabIndex ? 'slide-forward' : 'slide-backward';
    document.documentElement.classList.add(directionClass);

    const transition = document.startViewTransition(() => {
        radio.checked = true;
        currentTabIndex = newIndex;
    });

    transition.finished.finally(() => {
        document.documentElement.classList.remove(directionClass);
        measureStickyTitle();
        restoreTabScroll(newIndex);
        requestAnimationFrame(() => ensureTabFocusVisible(newIndex));
    });
}

function measureStickyTitle() {
    const el = document.getElementById('current-title');
    if (el && el.offsetHeight > 0) {
        document.documentElement.style.setProperty('--sticky-title-height', el.offsetHeight + 'px');
    }
}

/* Scroll an element into view within the .grid scroll container if it's clipped */
function scrollIntoGridView(el) {
    const grid = document.querySelector('.grid');
    if (!grid || !el) return;
    const elRect = el.getBoundingClientRect();
    // Skip hidden elements (inside display:none tab) — they report all zeros
    if (elRect.width === 0 && elRect.height === 0) return;
    const gridRect = grid.getBoundingClientRect();
    // Account for sticky headers overlapping from the top
    const stickyBottom = getStickyBottomEdge(el, gridRect.top);
    if (elRect.bottom > gridRect.bottom) {
        grid.scrollTop += elRect.bottom - gridRect.bottom;
    } else if (elRect.top < stickyBottom) {
        grid.scrollTop -= stickyBottom - elRect.top;
    }
}

/* Get the bottom edge of the lowest sticky header in the current tab */
function getStickyBottomEdge(el, gridTop) {
    const card = el.closest('.card');
    if (!card) return gridTop;
    const stickies = card.querySelectorAll('.header-row, #current-title, .markers-header');
    let bottom = gridTop;
    stickies.forEach(s => {
        const r = s.getBoundingClientRect();
        if (r.height > 0 && r.bottom > bottom) bottom = r.bottom;
    });
    return bottom;
}

/* Scroll the active item on whichever tab is currently visible */
function scrollActiveItemIntoView() {
    const playlistTab = document.getElementById('tab-playlist');
    if (playlistTab && playlistTab.checked) {
        const item = playlistUI.querySelector('.playlist-item.active');
        if (item) scrollIntoGridView(item);
    } else {
        const focusIdx = getMarkerFocusIndex();
        if (focusIdx !== null) setActiveMarkerUIByIndex(focusIdx, true);
    }
}

/* ======================== Swipe between tabs ======================== */
(function () {
    const container = document.querySelector('.grid');
    if (!container) return;

    let startX = 0, startY = 0, tracking = false;
    const SWIPE_MIN = 10;
    const ANGLE_MAX = 35;

    container.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        tracking = true;
    }, { passive: true });

    container.addEventListener('touchend', (e) => {
        if (!tracking) return;
        tracking = false;
        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        if (absDx < SWIPE_MIN) return;
        const angle = Math.atan2(absDy, absDx) * (180 / Math.PI);
        if (angle > ANGLE_MAX) return;
        // Swipe left → forward (Playlist→Events), swipe right → backward (Events→Playlist)
        if (dx < 0 && currentTabIndex === 0) {
            switchTab(1);
        } else if (dx > 0 && currentTabIndex === 1) {
            switchTab(0);
        }
    }, { passive: true });
})();

    }

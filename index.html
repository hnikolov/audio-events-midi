/* ======================== Swipe between tabs ======================== */
(function () {
    const container = document.querySelector('.grid');
    if (!container) return;

    let startX = 0, startY = 0, tracking = false;
    const SWIPE_MIN = 10;
    const ANGLE_MAX = 35;

    container.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        tracking = true;
    }, { passive: true });

    container.addEventListener('touchend', (e) => {
        if (!tracking) return;
        tracking = false;
        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        if (absDx < SWIPE_MIN) return;
        const angle = Math.atan2(absDy, absDx) * (180 / Math.PI);
        if (angle > ANGLE_MAX) return;
        // Swipe left → forward (Playlist→Events), swipe right → backward (Events→Playlist)
        if (dx < 0 && currentTabIndex === 0) {
            switchTab(1);
        } else if (dx > 0 && currentTabIndex === 1) {
            switchTab(0);
        }
    }, { passive: true });
})();

/* ========================== .aem Export / Import ========================== */
const AEM_MAGIC = new Uint8Array([0x41, 0x45, 0x4D, 0x49]); // "AEMI"
const AEM_VERSION = 1;
const SHARE_TARGET_DB_NAME = 'audio-share-target-db';
const SHARE_TARGET_DB_STORE = 'inbox';
const SHARE_TARGET_DB_KEY = 'pending-share-files';
let lastExportDirHandle = null;
let lastExportPickerHandle = null;
let lastImportPickerHandle = null;
let exportNoticeTimer = null;
let ioBusyDepth = 0;
let ioBusyCloseTimer = null;

function openShareTargetDb() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(SHARE_TARGET_DB_NAME, 1);
        req.onupgradeneeded = () => {
            const dbInstance = req.result;
            if (!dbInstance.objectStoreNames.contains(SHARE_TARGET_DB_STORE)) {
                dbInstance.createObjectStore(SHARE_TARGET_DB_STORE, { keyPath: 'key' });
            }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error('Failed to open share target database'));
    });
}

async function takeSharedFilesFromInbox() {
    const dbInstance = await openShareTargetDb();
    try {
        return await new Promise((resolve, reject) => {
            const tx = dbInstance.transaction(SHARE_TARGET_DB_STORE, 'readwrite');
            const store = tx.objectStore(SHARE_TARGET_DB_STORE);
            const getReq = store.get(SHARE_TARGET_DB_KEY);

            getReq.onsuccess = () => {
                const record = getReq.result;
                if (!record || !Array.isArray(record.files) || record.files.length === 0) {
                    resolve([]);
                    return;
                }

                const files = record.files;
                const deleteReq = store.delete(SHARE_TARGET_DB_KEY);
                deleteReq.onsuccess = () => resolve(files);
                deleteReq.onerror = () => reject(deleteReq.error || new Error('Failed to clear share target inbox'));
            };

            getReq.onerror = () => reject(getReq.error || new Error('Failed to read shared files from inbox'));
            tx.onabort = () => reject(tx.error || new Error('Share inbox transaction aborted'));
        });
    } finally {
        dbInstance.close();
    }
}

function clearShareTargetQueryParam() {
    const url = new URL(window.location.href);
    if (!url.searchParams.has('share-target')) return;
    url.searchParams.delete('share-target');
    history.replaceState({}, '', url.pathname + url.search + url.hash);
}

async function detectSharedImportKind(file) {
    const fileName = String(file?.name || '').toLowerCase();
    const mime = String(file?.type || '').toLowerCase();

    if (fileName.endsWith('.aem') || fileName.endsWith('.aep')) return 'song';
    if (fileName.endsWith('.aeps')) return 'playset';

    try {
        const header = new Uint8Array(await file.slice(0, 4).arrayBuffer());
        if (
            header.length === 4 &&
            header[0] === AEM_MAGIC[0] &&
            header[1] === AEM_MAGIC[1] &&
            header[2] === AEM_MAGIC[2] &&
            header[3] === AEM_MAGIC[3]
        ) {
            return 'song';
        }
    } catch {}

    const looksJson = mime.includes('json') || mime.includes('text') || mime === '';
    if (looksJson) {
        try {
            const text = await file.text();
            const payload = JSON.parse(text);
            if (payload && typeof payload === 'object') {
                const hasPlaysetName = typeof payload.name === 'string' && payload.name.trim().length > 0;
                const hasSongsArray = Array.isArray(payload.songNames);
                if (hasPlaysetName && hasSongsArray) return 'playset';
            }
        } catch {}
    }

    return 'unknown';
}

async function importSharedFilesFromShareTarget() {
    const params = new URLSearchParams(window.location.search);
    if (!params.has('share-target')) return;

    try {
        if (!db) {
            clearShareTargetQueryParam();
            return;
        }

        const files = await takeSharedFilesFromInbox();
        if (!files.length) {
            clearShareTargetQueryParam();
            return;
        }

        let songsImported = 0;
        let playsetsImported = 0;
        let failed = 0;
        let unsupported = 0;

        for (const file of files) {
            const kind = await detectSharedImportKind(file);
            if (kind === 'song') {
                const ok = await importSong(file);
                if (ok) songsImported++; else failed++;
            } else if (kind === 'playset') {
                const ok = await importPlaysetDefinitionFile(file);
                if (ok) playsetsImported++; else failed++;
            } else {
                unsupported++;
            }
        }

        updatePlaysetLabel();
        renderPlaysetSheet();
        await renderPlaylist();

        const parts = [];
        if (songsImported) parts.push(`${songsImported} song(s)`);
        if (playsetsImported) parts.push(`${playsetsImported} playset(s)`);
        if (unsupported) parts.push(`${unsupported} unsupported file(s)`);
        if (failed) parts.push(`${failed} failed`);
        const summary = parts.length ? parts.join(', ') : 'No supported shared files found';
        showExportNotice(`Shared import: ${summary}`);
    } catch (err) {
        alert(`Shared import failed: ${err.message || err}`);
    } finally {
        clearShareTargetQueryParam();
    }
}

function hideIoBusy() {
    const dialog = document.getElementById('ioBusyDialog');
    if (ioBusyDepth > 0) ioBusyDepth--;
    if (!dialog) return;
    if (ioBusyDepth > 0) return;
    dialog.classList.remove('show');
    if (ioBusyCloseTimer) clearTimeout(ioBusyCloseTimer);
    ioBusyCloseTimer = setTimeout(() => {
        if (ioBusyDepth === 0 && dialog.open) dialog.close();
        ioBusyCloseTimer = null;
    }, 220);
}

function hideIoBusyImmediately() {
    const dialog = document.getElementById('ioBusyDialog');
    if (ioBusyCloseTimer) {
        clearTimeout(ioBusyCloseTimer);
        ioBusyCloseTimer = null;
    }
    ioBusyDepth = 0;
    if (dialog) dialog.classList.remove('show');
    if (dialog && dialog.open) dialog.close();
}

async function resolveBatchFolderHandle() {

async function listFolderFileHandlesByExtension(folderHandle, extension) {
    if (!folderHandle) return [];
    const ext = String(extension || '').toLowerCase();
    const out = [];
    for await (const entry of folderHandle.values()) {
        if (entry.kind !== 'file') continue;
        if (!entry.name.toLowerCase().endsWith(ext)) continue;
        out.push(entry);
    }
    out.sort((a, b) => a.name.localeCompare(b.name));
    return out;
}

async function packAem(songName) {
    const song = await getSongByName(songName);
    if (!song) throw new Error('Song not found: ' + songName);

    const eventMap = JSON.parse(localStorage.getItem(EVENT_MAP_KEY) || '{}');
    const volMap = JSON.parse(localStorage.getItem(VOLUME_MAP_KEY) || '{}');
    const speedMap = JSON.parse(localStorage.getItem(SPEED_MAP_KEY) || '{}');
    const abMap = JSON.parse(localStorage.getItem(AB_LOOP_MAP_KEY) || '{}');
    const eqMap = JSON.parse(localStorage.getItem(EQ_MAP_KEY) || '{}');

    const metadata = {
        version: AEM_VERSION,
        name: song.name,
        type: song.type || '',
        lastModified: song.lastModified || Date.now(),
        markerData: eventMap[songName] || null,
        volume: volMap[songName] !== undefined ? volMap[songName] : 1.0,
        speed: speedMap[songName] !== undefined ? speedMap[songName] : 1.0,
        abLoop: abMap[songName] || null,
        eq: eqMap[songName] || { bass: 0, mid: 0, treble: 0 }
    };

    const metaJson = new TextEncoder().encode(JSON.stringify(metadata));
    const audioBlob = song.data instanceof Blob ? song.data : new Blob([song.data]);
    const audioBuffer = await audioBlob.arrayBuffer();

    // Layout: [4 magic][1 version][4 meta-length][N meta][rest audio]
    const totalSize = 4 + 1 + 4 + metaJson.byteLength + audioBuffer.byteLength;
    const output = new ArrayBuffer(totalSize);
    const view = new DataView(output);
    const bytes = new Uint8Array(output);

    bytes.set(AEM_MAGIC, 0);
    view.setUint8(4, AEM_VERSION);
    view.setUint32(5, metaJson.byteLength, false);
    bytes.set(metaJson, 9);
    bytes.set(new Uint8Array(audioBuffer), 9 + metaJson.byteLength);

    return new Blob([output], { type: 'application/octet-stream' });
}

function unpackAem(arrayBuffer) {
    const view = new DataView(arrayBuffer);
    const bytes = new Uint8Array(arrayBuffer);

    if (bytes.length < 9) throw new Error('File too small to be a valid .aem file');
    for (let i = 0; i < 4; i++) {
        if (bytes[i] !== AEM_MAGIC[i]) throw new Error('Not a valid .aem file (bad magic)');
    }
    const fileVersion = view.getUint8(4);
    if (fileVersion > AEM_VERSION) throw new Error('Unsupported .aem version: ' + fileVersion);

    const metaLen = view.getUint32(5, false);
    if (9 + metaLen > bytes.length) throw new Error('Corrupt .aem file (metadata overflows)');

    const metaBytes = bytes.slice(9, 9 + metaLen);
    const metadata = JSON.parse(new TextDecoder().decode(metaBytes));

    const audioBytes = bytes.slice(9 + metaLen);
    const audioBlob = new Blob([audioBytes], { type: metadata.type || 'audio/mpeg' });

    return { metadata, audioBlob };
}

function makeSongNameUnique(desiredName, existingNames) {
    if (!existingNames.includes(desiredName)) return desiredName;
    let counter = 1;
    const dotIdx = desiredName.lastIndexOf('.');
    const base = dotIdx > 0 ? desiredName.substring(0, dotIdx) : desiredName;
    const ext = dotIdx > 0 ? desiredName.substring(dotIdx) : '';
    let candidate;
    do {
        candidate = `${base} (${counter})${ext}`;
        counter++;
    } while (existingNames.includes(candidate));
    return candidate;
}

async function exportSong(songName, options = {}) {
    showIoBusy('Exporting song...');
    try {
        const showFolderNotice = options.showFolderNotice !== false;
        const blob = await packAem(songName);
        const safeName = songName.replace(/[^a-zA-Z0-9._\-() ]/g, '_');
        const fileName = safeName.replace(/\.[^.]+$/, '') + '.aem';
        const shareRequested = options.share === true;

        if (shareRequested) {
            const file = new File([blob], fileName, { type: 'application/octet-stream', lastModified: Date.now() });
            const shareResult = await tryNativeShareFile(file, {
                title: `Share song: ${songName}`,
                text: fileName
            });
            if (shareResult.status === 'shared') return true;
            if (shareResult.status === 'cancelled') return false;
            if (shareResult.status === 'unsupported') {
                alert('Sharing files is not supported in this browser.');
                return false;
            }
            alert(`Share failed: ${shareResult.error?.message || 'Unknown error'}`);
            return false;
        }

        const settings = loadUiSettings();

        if (settings.overwriteSongsOnExport && window.showDirectoryPicker) {
            try {
                if (!lastExportDirHandle) {
                    lastExportDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                }
                if (lastExportDirHandle) {
                    const fileHandle = await lastExportDirHandle.getFileHandle(fileName, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    if (showFolderNotice) showExportNotice(`Exported to folder: ${getExportFolderName()}`);
                    return true;
                }
            } catch (err) {
                if (err.name === 'AbortError') return false;
                lastExportDirHandle = null;
                updateExportFolderLabelInInfoSheet();
            }
        }

        if (window.showSaveFilePicker) {
            try {
                const opts = {
                    suggestedName: fileName,
                    types: [{ description: 'Audio Events MIDI file', accept: { 'application/octet-stream': ['.aem'] } }]
                };
                const startIn = getPickerStartIn(lastExportPickerHandle);
                if (startIn) opts.startIn = startIn;
                const handle = await window.showSaveFilePicker(opts);
                lastExportPickerHandle = handle;
                const writable = await handle.createWritable();
                await writable.write(blob);
                await writable.close();
                return true;
            } catch (err) {
                if (err.name === 'AbortError') return false;
            }
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        return true;
    } catch (err) {
        alert('Export failed: ' + err.message);
        return false;
    } finally {
        hideIoBusy();
    }
}

async function importSong(file) {
    showIoBusy('Importing song...');
    try {
        const arrayBuffer = await file.arrayBuffer();
        const { metadata, audioBlob } = unpackAem(arrayBuffer);

        const allSongs = await getAllSongs();
        const existingNames = allSongs.map(s => s.name);
        const settings = loadUiSettings();

        let finalName = metadata.name || file.name.replace(/\.aem$/i, '');

        if (existingNames.includes(finalName) && !settings.overwriteSongsOnImport) {
            const suggested = makeSongNameUnique(finalName, existingNames);
            const userInput = prompt(
                `"${finalName}" already exists.\n\nEnter a new name, or press OK to use the suggested alternative:`,
                suggested
            );
            if (userInput === null) return;
            finalName = userInput.trim();
            if (!finalName) return;
        }

        const audioFile = new File([audioBlob], finalName, {
            type: metadata.type || 'audio/mpeg',
            lastModified: metadata.lastModified || Date.now()
        });
        await putSongs([audioFile]);

        // Always write imported values so overwriting a selected song correctly
        // replaces existing settings (including clearing markers or AB loop).
        const eventMap = JSON.parse(localStorage.getItem(EVENT_MAP_KEY) || '{}');
        if (metadata.markerData && typeof metadata.markerData === 'object' && metadata.markerData.sets) {
            eventMap[finalName] = metadata.markerData;
        } else {
            eventMap[finalName] = {
                activeId: 'default',
                sets: { default: { name: 'Default Set', events: normalizeMarkerList(Array.isArray(metadata.markers) ? metadata.markers : []) } }
            };
        }
        localStorage.setItem(EVENT_MAP_KEY, JSON.stringify(eventMap));

        const volMap = JSON.parse(localStorage.getItem(VOLUME_MAP_KEY) || '{}');
        volMap[finalName] = Number.isFinite(metadata.volume) ? metadata.volume : 1.0;
        localStorage.setItem(VOLUME_MAP_KEY, JSON.stringify(volMap));
        
        const eqMap = JSON.parse(localStorage.getItem(EQ_MAP_KEY) || '{}');
        eqMap[finalName] = metadata.eq || { bass: 0, mid: 0, treble: 0 };
        localStorage.setItem(EQ_MAP_KEY, JSON.stringify(eqMap));

        const speedMap = JSON.parse(localStorage.getItem(SPEED_MAP_KEY) || '{}');
        speedMap[finalName] = Number.isFinite(metadata.speed) ? metadata.speed : 1.0;
        localStorage.setItem(SPEED_MAP_KEY, JSON.stringify(speedMap));

        const abMap = JSON.parse(localStorage.getItem(AB_LOOP_MAP_KEY) || '{}');
        if (metadata.abLoop && typeof metadata.abLoop === 'object') {
            abMap[finalName] = metadata.abLoop;
        } else {
            delete abMap[finalName];
        }
        localStorage.setItem(AB_LOOP_MAP_KEY, JSON.stringify(abMap));

        // If the imported song is currently selected, sync the live player state.
        if (finalName === currentFileName) {
            const savedVol = volMap[finalName];
            audio.volume = savedVol;
            audio.muted = false;
            volSlider.value = savedVol;
            const savedRate = speedMap[finalName] ?? 1.0;
            setPlaybackRate(savedRate);
            firedEvents.clear();
            lastTriggeredMarkerTime = null;
            lastTriggeredMarkerIndex = null;
            await refreshEventUI();
            loadABLoop();
            updateMarkerTicks();
            updateMuteUI();
        }

        await renderPlaylist();
        return true;
    } catch (err) {
        alert('Import failed: ' + err.message);
        return false;
    } finally {
        hideIoBusy();
    }
}

/* ===================== Fixed bars: measure heights (no re-parenting) ===================== */
(function () {
  const root = document.documentElement;

  function setHeights() {
    const topBar    = document.getElementById('mobileMidiBar');
    const bottomBar = document.getElementById('mobilePlayerBar');
    const titleEl   = document.getElementById('current-title');
    if (topBar) {
      const th = topBar.offsetHeight || 0;
      root.style.setProperty('--mobile-topbar-height', th + 'px');
    }
    if (bottomBar) {
      const bh = bottomBar.offsetHeight || 0;
      root.style.setProperty('--mobile-playerbar-height', bh + 'px');
    }
    if (titleEl && titleEl.offsetHeight > 0) {
      root.style.setProperty('--sticky-title-height', titleEl.offsetHeight + 'px');
    }
  }

  let scheduled = false;
  function rafSetHeights() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(() => { scheduled = false; setHeights(); });
  }

  window.addEventListener('resize', rafSetHeights, { passive: true });
  window.addEventListener('orientationchange', setHeights);
  document.addEventListener('DOMContentLoaded', () => {
    setHeights();
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(setHeights).catch(() => {});
    }
  });
})();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// Portrait orientation lock for installed PWA
(function () {
  function lockPortrait() {
    if (screen.orientation && typeof screen.orientation.lock === 'function') {
      screen.orientation.lock('portrait').catch(function (err) {
        console.warn('[orientation-lock]', err.name, err.message);
      });
    }
  }
  // Try immediately (works if already in standalone context)
  lockPortrait();
  // Retry after DOM is ready
  document.addEventListener('DOMContentLoaded', lockPortrait);
  // Retry every time the app comes back to foreground
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) lockPortrait();
  });
})();

// Screen Wake Lock: keep screen on while the app is visible
(function () {
  var wl = null;
  function acquire() {
    if (wl || !('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen').then(function (lock) {
      wl = lock;
      wl.addEventListener('release', function () { wl = null; });
    }).catch(function () { /* OS refused */ });
  }
  function release() { if (wl) { wl.release(); wl = null; } }
  document.addEventListener('visibilitychange', function () {
    document.visibilityState === 'visible' ? acquire() : release();
  });
  acquire();
})();
</script>
